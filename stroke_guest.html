<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Clinical Tools — Guest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeece8;--tx:#1a1a18;--tx2:#6b6b67;
  --bl:#e5e3dc;--bm:#c8c6be;--rm:8px;--rl:12px;
  --sbg:#EAF3DE;--stx:#27500A;--sbd:#97C459;
  --wbg:#FAEEDA;--wtx:#633806;--wbd:#EF9F27;
  --dbg:#FCEBEB;--dtx:#791F1F;--dbd:#F09595;
  --ibg:#E6F1FB;--itx:#185FA5;--ibd:#85B7EB;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#111110;--tx:#f0ede6;--tx2:#9a9893;
  --bl:#2e2e2b;--bm:#3a3a36;
  --sbg:#173404;--stx:#C0DD97;--sbd:#3B6D11;
  --wbg:#412402;--wtx:#FAC775;--wbd:#854F0B;
  --dbg:#501313;--dtx:#F7C1C1;--dbd:#A32D2D;
  --ibg:#042C53;--itx:#B5D4F4;--ibd:#185FA5;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:var(--bg3);color:var(--tx);font-size:14px;min-height:100vh}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg);color:var(--tx);width:100%;outline:none}
input:focus,select:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bm);border-radius:4px}

.topbar{background:var(--bg);border-bottom:0.5px solid var(--bl);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.guest-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--sbg);color:var(--stx);border:0.5px solid var(--sbd);font-weight:600}
.nihss-badge{padding:5px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;position:sticky;top:57px;z-index:99;transition:all .3s}
.tab-bar{display:flex;background:var(--bg);border-bottom:0.5px solid var(--bl);overflow-x:auto;position:sticky;z-index:98;-webkit-overflow-scrolling:touch}
.tab-btn{padding:11px 14px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:13px;color:var(--tx2);white-space:nowrap;font-family:inherit;transition:color .15s,border-color .15s}
.tab-btn.active{color:#639922;border-bottom-color:#639922;font-weight:600}
.content{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.card{background:var(--bg);border:0.5px solid var(--bl);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.sec{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}

/* BF chips */
.bf-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--rm);margin-bottom:7px;cursor:pointer;user-select:none;border:0.5px solid var(--bl);background:var(--bg2);transition:all .1s}
.bf-row.on{background:var(--sbg);border-color:var(--sbd)}
.bf-letter{width:30px;height:30px;border-radius:var(--rm);border:0.5px solid var(--bm);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--tx2);flex-shrink:0;transition:all .1s}
.bf-letter.on{background:#639922;border-color:#3B6D11;color:white}
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sym-chip{padding:9px 10px;border-radius:var(--rm);border:0.5px solid var(--bl);background:var(--bg2);cursor:pointer;user-select:none;font-size:13px;display:flex;align-items:center;gap:7px;transition:all .1s}
.sym-chip.on{background:var(--sbg);border-color:var(--sbd);color:var(--stx)}
.chip-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--bm);flex-shrink:0;transition:all .1s}
.sym-chip.on .chip-dot{background:#639922;border-color:#3B6D11}

/* Checklist */
.ck-row{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:var(--rm);margin-bottom:5px;cursor:pointer;user-select:none;border:0.5px solid var(--bl);background:var(--bg2)}
.ck-row.ok{background:var(--sbg);border-color:var(--sbd)}
.ck-row.bad{background:var(--dbg);border-color:var(--dbd)}
.ckbox{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--bm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px}
.ckbox.ok{background:#639922;border-color:#3B6D11;color:white}
.ckbox.bad{background:#C41E3A;border-color:#8B1225;color:white}
.dec-box{padding:12px 16px;border-radius:var(--rl);text-align:center;font-size:14px;font-weight:700;border:1.5px solid;margin-top:6px}

/* NIHSS */
.score-ring{display:flex;align-items:center;gap:14px;padding:14px;border-radius:var(--rl);margin-bottom:10px;border:1.5px solid;position:sticky;top:57px;z-index:90}
.ring{width:70px;height:70px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.ni-item{padding:10px 12px;background:var(--bg2);border-radius:var(--rm);border:0.5px solid var(--bl);margin-bottom:8px}
.ni-opts{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.ni-btn{padding:4px 10px;border-radius:6px;border:0.5px solid var(--bm);background:var(--bg);font-size:12px;color:var(--tx);cursor:pointer;transition:all .1s}
.ni-btn.s0{background:var(--sbg);border-color:var(--sbd);color:var(--stx);font-weight:600}
.ni-btn.sw{background:var(--wbg);border-color:var(--wbd);color:var(--wtx);font-weight:600}
.ni-btn.sd{background:var(--dbg);border-color:var(--dbd);color:var(--dtx);font-weight:600}

/* rt-PA */
.dose-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.dose-card{background:var(--bg2);border-radius:var(--rm);padding:10px;text-align:center}
.warn-row{display:flex;gap:8px;margin-bottom:7px;font-size:13px;align-items:flex-start}
.step-num{width:19px;height:19px;border-radius:50%;background:var(--dbg);color:var(--dtx);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
</style>
</head>
<body>

<div id="topbar" class="topbar">
  <div>
    <div style="font-size:13px;font-weight:700">Stroke Clinical Tools</div>
    <div style="font-size:10px;color:var(--tx2)">โรงพยาบาลสงฆ์</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="clockEl" style="font-size:12px;font-variant-numeric:tabular-nums;color:var(--tx2)"></div>
    <span class="guest-tag">⚡ Guest</span>
  </div>
</div>

<div id="nihssBadge" style="display:none" class="nihss-badge"></div>

<div class="tab-bar" id="tabBar" style="top:57px">
  <button class="tab-btn active" onclick="switchTab('befast',this)">BEFAST</button>
  <button class="tab-btn" onclick="switchTab('criteria',this)">Checklist</button>
  <button class="tab-btn" onclick="switchTab('nihss',this)">NIHSS</button>
  <button class="tab-btn" onclick="switchTab('rtpa',this)">rt-PA</button>
</div>

<div class="content" id="content"></div>

<script>
// ── STATE ──
let currentTab='befast';
let D={
  befast:{B:false,E:false,F:false,A:false,S:false},
  symp:{hemi:false,numb:false,comm:false,dys:false,vis:false,drow:false,atax:false},
  incl:{ais:false,o45:false,a18:false},
  absX:{},relX:{},excl45:{n25:false,i17:false},rel45:{a80:false,sdm:false},
  nihss:{},
  weight:'',
};

const NIHSS=[
  {id:'1a',th:'1a. ระดับความรู้สึก (LOC)',opts:[{v:0,t:'ตื่นดี'},{v:1,t:'ง่วง/ปลุกได้'},{v:2,t:'ต้องกระตุ้น'},{v:3,t:'ไม่ตอบสนอง'}]},
  {id:'1b',th:'1b. LOC คำถาม (เดือน/อายุ)',opts:[{v:0,t:'ถูก 2'},{v:1,t:'ถูก 1'},{v:2,t:'ถูก 0'}]},
  {id:'1c',th:'1c. LOC คำสั่ง (กำมือ/หลับตา)',opts:[{v:0,t:'ทำ 2'},{v:1,t:'ทำ 1'},{v:2,t:'ทำ 0'}]},
  {id:'2',th:'2. การมองตาม (Best Gaze)',opts:[{v:0,t:'ปกติ'},{v:1,t:'Partial palsy'},{v:2,t:'Forced deviation'}]},
  {id:'3',th:'3. การมองเห็น (Visual)',opts:[{v:0,t:'ปกติ'},{v:1,t:'Partial hemianopia'},{v:2,t:'Complete hemianopia'},{v:3,t:'Bilateral hemianopia'}]},
  {id:'4',th:'4. ใบหน้า (Facial Palsy)',opts:[{v:0,t:'ปกติ'},{v:1,t:'Minor'},{v:2,t:'Partial (ล่าง)'},{v:3,t:'Complete'}]},
  {id:'5a',th:'5a. แขนซ้าย (90° / 10 วิ)',opts:[{v:0,t:'ไม่ drift'},{v:1,t:'Drift'},{v:2,t:'ต้านบ้าง'},{v:3,t:'ต้านไม่ได้'},{v:4,t:'ไม่เคลื่อน'}]},
  {id:'5b',th:'5b. แขนขวา (90° / 10 วิ)',opts:[{v:0,t:'ไม่ drift'},{v:1,t:'Drift'},{v:2,t:'ต้านบ้าง'},{v:3,t:'ต้านไม่ได้'},{v:4,t:'ไม่เคลื่อน'}]},
  {id:'6a',th:'6a. ขาซ้าย (30° / 5 วิ)',opts:[{v:0,t:'ไม่ drift'},{v:1,t:'Drift'},{v:2,t:'ต้านบ้าง'},{v:3,t:'ต้านไม่ได้'},{v:4,t:'ไม่เคลื่อน'}]},
  {id:'6b',th:'6b. ขาขวา (30° / 5 วิ)',opts:[{v:0,t:'ไม่ drift'},{v:1,t:'Drift'},{v:2,t:'ต้านบ้าง'},{v:3,t:'ต้านไม่ได้'},{v:4,t:'ไม่เคลื่อน'}]},
  {id:'7',th:'7. Limb Ataxia',opts:[{v:0,t:'ไม่มี'},{v:1,t:'มี 1 ข้าง'},{v:2,t:'มี 2 ข้าง'}]},
  {id:'8',th:'8. ความรู้สึก (Sensory)',opts:[{v:0,t:'ปกติ'},{v:1,t:'ลดลงบ้าง'},{v:2,t:'รุนแรง/หมด'}]},
  {id:'9',th:'9. การพูด (Language)',opts:[{v:0,t:'ปกติ'},{v:1,t:'Mild aphasia'},{v:2,t:'Severe aphasia'},{v:3,t:'Mute/Global'}]},
  {id:'10',th:'10. Dysarthria',opts:[{v:0,t:'ปกติ'},{v:1,t:'ไม่ชัดบ้าง'},{v:2,t:'ไม่ชัดมาก'}]},
  {id:'11',th:'11. Extinction/Inattention',opts:[{v:0,t:'ปกติ'},{v:1,t:'1 ด้าน'},{v:2,t:'Profound'}]},
];
const ABS=[
  {id:'sbp',t:'SBP >185 หรือ DBP >110 mmHg'},
  {id:'ect',t:'CT early ischemic change >1/3 hemisphere'},
  {id:'sah',t:'อาการสงสัย SAH'},
  {id:'ich',t:'ประวัติ intracranial hemorrhage'},
  {id:'tum',t:'Intracranial tumor / aneurysm / AVM'},
  {id:'s3m',t:'Prior stroke หรือ head trauma ใน 3 เดือน'},
  {id:'bl',t:'Active bleeding'},
  {id:'ar7',t:'Arterial puncture กดไม่ได้ ใน 7 วัน'},
  {id:'gl',t:'Blood sugar <50 mg/dl'},
  {id:'hep',t:'Heparin ใน 48 ชม. + PTT สูง'},
  {id:'ac',t:'Anticoagulant INR >1.7 หรือ PT >15 วิ'},
  {id:'plt',t:'Platelet <100,000'},
];
const REL=[
  {id:'n4',t:'NIHSS <4 หรืออาการดีขึ้นเร็ว'},
  {id:'sei',t:'ชักเมื่อเริ่มมีอาการ'},
  {id:'sur',t:'ผ่าตัดใหญ่ใน 14 วัน'},
  {id:'gib',t:'GI/Urinary hemorrhage ใน 21 วัน'},
  {id:'mi3',t:'MI ใน 3 เดือน'},
  {id:'prg',t:'ตั้งครรภ์'},
];

// ── HELPERS ──
function totNIHSS(){return NIHSS.reduce((s,i)=>s+(D.nihss[i.id]??0),0);}
function getSev(n){
  if(n<=0)return{l:'ปกติ',bg:'var(--sbg)',co:'var(--stx)',bd:'var(--sbd)',hx:'#EAF3DE',hco:'#27500A'};
  if(n<=4)return{l:'เล็กน้อย',bg:'var(--sbg)',co:'var(--stx)',bd:'var(--sbd)',hx:'#EAF3DE',hco:'#27500A'};
  if(n<=15)return{l:'ปานกลาง',bg:'var(--wbg)',co:'var(--wtx)',bd:'var(--wbd)',hx:'#FAEEDA',hco:'#633806'};
  if(n<=20)return{l:'ปานกลาง-รุนแรง',bg:'var(--dbg)',co:'var(--dtx)',bd:'var(--dbd)',hx:'#FCEBEB',hco:'#791F1F'};
  return{l:'รุนแรง',bg:'var(--dbg)',co:'var(--dtx)',bd:'var(--dbd)',hx:'#FCEBEB',hco:'#791F1F'};
}
function hasAbs(){return Object.values(D.absX).some(Boolean);}
function allIncl(){return D.incl.ais&&D.incl.o45&&D.incl.a18;}
function elig(){return allIncl()&&!hasAbs();}

// ── TABS ──
function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

function render(){
  const sc=Object.keys(D.nihss).length;
  const t=totNIHSS();const sv=getSev(t);

  // NIHSS badge
  const badge=document.getElementById('nihssBadge');
  const tabBar=document.getElementById('tabBar');
  if(sc>0){
    badge.style.display='flex';
    badge.style.background=sv.bg;
    badge.style.borderBottom=`0.5px solid ${sv.bd}`;
    badge.innerHTML=`<span style="color:${sv.co};font-weight:600">NIHSS ${t} — ${sv.l}</span><span style="color:var(--tx2);font-size:11px">${sc}/15 รายการ</span>`;
    badge.style.top='57px';
    tabBar.style.top='83px';
  } else {
    badge.style.display='none';
    tabBar.style.top='57px';
  }

  const fns={befast:rBEFAST,criteria:rCriteria,nihss:rNIHSS,rtpa:rRtPA};
  document.getElementById('content').innerHTML=(fns[currentTab]||rBEFAST)();
}

// ── BEFAST ──
function rBEFAST(){
  const bfI=[
    {k:'B',th:'Balance',d:'เวียนหัวกะทันหัน — เดินเซ — ทรงตัวไม่ได้'},
    {k:'E',th:'Eyes',d:'ตาพร่า — เห็นภาพซ้อน — มองไม่เห็นบางส่วนฉับพลัน'},
    {k:'F',th:'Face',d:'ปากเบี้ยว — หน้าเบี้ยว — มุมปากตก'},
    {k:'A',th:'Arm / Leg',d:'แขนขาอ่อนแรง — ชาครึ่งซีกกะทันหัน'},
    {k:'S',th:'Speech',d:'พูดไม่ชัด — ลิ้นแข็ง — พูดลำบาก — สับสน'},
  ];
  const syI=[
    {id:'hemi',t:'อ่อนแรงครึ่งซีกเฉียบพลัน'},{id:'numb',t:'ชาครึ่งซีกเฉียบพลัน'},
    {id:'comm',t:'สื่อสารไม่เข้าใจเฉียบพลัน'},{id:'dys',t:'พูดไม่ชัดเฉียบพลัน'},
    {id:'vis',t:'ตามัวซีก'},{id:'drow',t:'ซึมลงเฉียบพลัน'},{id:'atax',t:'เดินเซเฉียบพลัน'},
  ];
  const cnt=Object.values(D.befast).filter(Boolean).length;
  return `<div class="card">
  <div class="sec">BEFAST — ประเมินอาการโรคหลอดเลือดสมอง${cnt>0?` <span style="color:var(--stx);font-weight:600">(${cnt} อาการ)</span>`:''}</div>
  ${bfI.map(i=>{const c=D.befast[i.k];return `<div class="bf-row${c?' on':''}" onclick="toggle('befast','${i.k}')">
    <div class="bf-letter${c?' on':''}">${i.k}</div>
    <div style="flex:1"><div style="font-size:14px;font-weight:500">${i.th}</div><div style="font-size:12px;color:var(--tx2)">${i.d}</div></div>
    <div style="font-size:18px;color:var(--stx)">${c?'✓':''}</div>
  </div>`;}).join('')}
  <div style="padding:8px 12px;background:var(--bg2);border-radius:var(--rm);font-size:12px;color:var(--tx2)">
    T — Time: บันทึกเวลา onset ทันที — รายงานแพทย์ด่วนถ้า onset ≤24 ชม.
  </div></div>
  <div class="card"><div class="sec">Nurse Checklist</div>
  <div class="sym-grid">
  ${syI.map(s=>`<div class="sym-chip${D.symp[s.id]?' on':''}" onclick="toggle('symp','${s.id}')"><div class="chip-dot"></div>${s.t}</div>`).join('')}
  </div></div>
  <div style="padding:10px 14px;background:var(--ibg);border-radius:var(--rl);border:0.5px solid var(--ibd);font-size:12px;color:var(--itx);line-height:1.7">
    ⚡ <strong>Guest Mode</strong> — ไม่บันทึกข้อมูลผู้ป่วย ข้อมูลจะหายเมื่อปิด browser
  </div>`;
}

// ── CRITERIA ──
function ckr(checked,label,onclick,danger=false){
  return `<div class="ck-row${checked?(danger?' bad':' ok'):''}" onclick="${onclick}">
    <div class="ckbox${checked?(danger?' bad':' ok'):''}${checked?'':''}">${checked?'✓':''}</div>
    <div style="flex:1;font-size:13px;line-height:1.5">${label}</div>
  </div>`;}
function rCriteria(){
  const el=elig(),ab=hasAbs(),inc=allIncl();
  const dbg=el?'var(--sbg)':ab?'var(--dbg)':'var(--wbg)';
  const dc=el?'var(--stx)':ab?'var(--dtx)':'var(--wtx)';
  const dbd=el?'var(--sbd)':ab?'var(--dbd)':'var(--wbd)';
  const dtx=el?'เข้าเกณฑ์การให้ rt-PA':ab?'ห้ามให้ rt-PA — มีข้อห้ามเด็ดขาด':'ยังประเมินไม่ครบ';
  return `<div class="card">
  <div class="sec">Inclusion — ต้องครบทั้ง 3 ข้อ</div>
  ${ckr(D.incl.ais,'วินิจฉัย Acute Ischemic Stroke',"toggle('incl','ais');updDec()")}
  ${ckr(D.incl.o45,'Onset ≤4.5 ชั่วโมง',"toggle('incl','o45');updDec()")}
  ${ckr(D.incl.a18,'อายุ ≥18 ปี',"toggle('incl','a18');updDec()")}
  ${inc?`<div style="margin-top:6px;padding:8px 12px;background:var(--sbg);border-radius:var(--rm);font-size:13px;color:var(--stx);font-weight:600">ครบ Inclusion criteria ทั้ง 3 ข้อ</div>`:''}
  </div>
  <div class="card">
  <div class="sec">Absolute Exclusion — ถ้าใช่ = ห้ามให้ยา</div>
  <div style="font-size:11px;color:var(--dtx);margin-bottom:8px">ทำเครื่องหมายเฉพาะรายการที่พบ (YES)</div>
  ${ABS.map(i=>ckr(D.absX[i.id]||false,i.t,`toggle('absX','${i.id}');updDec()`,true)).join('')}
  ${ab?`<div style="margin-top:6px;padding:8px 12px;background:var(--dbg);border-radius:var(--rm);font-size:13px;color:var(--dtx);font-weight:600">ห้ามให้ rt-PA — มีข้อห้ามเด็ดขาด</div>`:''}
  </div>
  <div class="card">
  <div class="sec">Relative Exclusion — พิจารณาตามดุลยพินิจ</div>
  ${REL.map(i=>ckr(D.relX[i.id]||false,i.t,`toggle('relX','${i.id}');updDec()`)).join('')}
  </div>
  <div class="card">
  <div class="sec">Onset 3–4.5 ชม. — เกณฑ์เพิ่มเติม</div>
  <div style="font-size:11px;color:var(--tx2);margin-bottom:6px">Absolute exclusion เพิ่ม</div>
  ${ckr(D.excl45.n25,'Severe stroke — NIHSS >25',"toggle('excl45','n25');updDec()",true)}
  ${ckr(D.excl45.i17,'INR >1.7',"toggle('excl45','i17');updDec()",true)}
  <div style="font-size:11px;color:var(--tx2);margin:8px 0 6px">Relative exclusion เพิ่ม</div>
  ${ckr(D.rel45.a80,'อายุ >80 ปี',"toggle('rel45','a80');updDec()")}
  ${ckr(D.rel45.sdm,'มีประวัติ stroke ร่วมกับ DM',"toggle('rel45','sdm');updDec()")}
  </div>
  <div id="decBox" class="dec-box" style="background:${dbg};border-color:${dbd};color:${dc}">${dtx}</div>`;
}
window.updDec=function(){
  const el=elig(),ab=hasAbs();
  const dbg=el?'var(--sbg)':ab?'var(--dbg)':'var(--wbg)';
  const dc=el?'var(--stx)':ab?'var(--dtx)':'var(--wtx)';
  const dbd=el?'var(--sbd)':ab?'var(--dbd)':'var(--wbd)';
  const dtx=el?'เข้าเกณฑ์การให้ rt-PA':ab?'ห้ามให้ rt-PA — มีข้อห้ามเด็ดขาด':'ยังประเมินไม่ครบ';
  const el2=document.getElementById('decBox');
  if(el2){el2.style.background=dbg;el2.style.borderColor=dbd;el2.style.color=dc;el2.textContent=dtx;}
};

// ── NIHSS ──
function rNIHSS(){
  const t=totNIHSS();const sv=getSev(t);const sc=Object.keys(D.nihss).length;
  return `<div class="score-ring" style="background:${sv.bg};border-color:${sv.bd}">
    <div class="ring" style="border-color:${sv.bd}">
      <div style="font-size:28px;font-weight:700;color:${sv.co};line-height:1">${t}</div>
      <div style="font-size:10px;color:${sv.co};opacity:.7">/42</div>
    </div>
    <div>
      <div style="font-size:17px;font-weight:700;color:${sv.co}">${sv.l}</div>
      <div style="font-size:12px;color:${sv.co};opacity:.8;margin-top:2px">${sc}/15${sc===15?' ✓ ครบแล้ว':''}</div>
    </div>
    <button onclick="resetNIHSS()" style="margin-left:auto;padding:5px 10px;border:0.5px solid ${sv.bd};border-radius:var(--rm);background:transparent;color:${sv.co};font-size:11px;font-family:inherit">รีเซ็ต</button>
  </div>
  ${NIHSS.map(item=>{
    const cur=D.nihss[item.id];
    return `<div class="ni-item"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:12px;font-weight:600">${item.th}</div>
      ${cur!==undefined?`<div style="padding:1px 8px;border-radius:4px;background:var(--bg3);font-size:12px;font-weight:700">${cur}</div>`:''}
    </div>
    <div class="ni-opts">
      ${item.opts.map(o=>{const sel=cur===o.v;const cls=sel?(o.v===0?'s0':o.v/(item.opts.length-1)<=0.5?'sw':'sd'):'';return `<button class="ni-btn${sel?' '+cls:''}" onclick="setNihss('${item.id}',${o.v})">${o.v}: ${o.t}</button>`;}).join('')}
    </div></div>`;
  }).join('')}
  <div class="card" style="margin-top:4px">
    <div class="sec">ระดับความรุนแรง NIHSS</div>
    ${[{r:'0',l:'ปกติ',bg:'#EAF3DE',co:'#27500A'},{r:'1–4',l:'เล็กน้อย',bg:'#C0DD97',co:'#27500A'},{r:'5–15',l:'ปานกลาง',bg:'#FAEEDA',co:'#633806'},{r:'16–20',l:'ปานกลาง-รุนแรง',bg:'#FAECE7',co:'#993C1D'},{r:'≥21',l:'รุนแรง',bg:'#FCEBEB',co:'#791F1F'}].map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><div style="min-width:48px;text-align:center;font-size:11px;font-weight:600;color:${s.co};background:${s.bg};padding:2px 5px;border-radius:3px">${s.r}</div><div style="font-size:13px">${s.l}</div></div>`).join('')}
  </div>`;
}
window.resetNIHSS=function(){D.nihss={};render();};
window.setNihss=function(id,v){
  D.nihss[id]=v;
  const t=totNIHSS();const sv=getSev(t);const sc=Object.keys(D.nihss).length;
  // update badge
  const badge=document.getElementById('nihssBadge');
  const tabBar=document.getElementById('tabBar');
  badge.style.display='flex';
  badge.style.background=sv.bg;
  badge.style.borderBottom=`0.5px solid ${sv.bd}`;
  badge.innerHTML=`<span style="color:${sv.co};font-weight:600">NIHSS ${t} — ${sv.l}</span><span style="color:var(--tx2);font-size:11px">${sc}/15 รายการ</span>`;
  badge.style.top='57px';
  tabBar.style.top='83px';
  // update score ring
  const ring=document.querySelector('.score-ring');
  if(ring){
    ring.style.background=sv.bg;ring.style.borderColor=sv.bd;
    ring.querySelector('.ring').style.borderColor=sv.bd;
    const scoreEl=ring.querySelector('.ring div:first-child');if(scoreEl){scoreEl.textContent=t;scoreEl.style.color=sv.co;}
    const subEl=ring.querySelector('.ring div:last-child');if(subEl)subEl.style.color=sv.co;
    const labelEl=ring.querySelector('div:nth-child(2)>div:first-child');if(labelEl){labelEl.textContent=sv.l;labelEl.style.color=sv.co;}
    const cntEl=ring.querySelector('div:nth-child(2)>div:last-child');if(cntEl){cntEl.textContent=`${sc}/15${sc===15?' ✓ ครบแล้ว':''}`;cntEl.style.color=sv.co;}
    const resetBtn=ring.querySelector('button');if(resetBtn){resetBtn.style.borderColor=sv.bd;resetBtn.style.color=sv.co;}
  }
  // update item display
  const item=document.querySelector(`.ni-item:nth-child(${NIHSS.findIndex(i=>i.id===id)+2})`);
  if(item){
    const scoreDisp=item.querySelector('div:first-child>div:last-child');
    if(scoreDisp&&scoreDisp.style.padding){scoreDisp.textContent=v;}
    else if(scoreDisp){scoreDisp.innerHTML+=`<div style="padding:1px 8px;border-radius:4px;background:var(--bg3);font-size:12px;font-weight:700">${v}</div>`;}
    item.querySelectorAll('.ni-btn').forEach(btn=>{
      const bv=parseInt(btn.textContent.split(':')[0]);
      const cls=v===0?'s0':v/(NIHSS.find(i=>i.id===id)?.opts.length-1)<=0.5?'sw':'sd';
      btn.className='ni-btn'+(bv===v?' '+cls:'');
    });
  }
};

// ── rt-PA ──
function rRtPA(){
  const bw=parseFloat(D.weight)||0;
  const td=bw?Math.min(bw*0.9,90):0;
  return `<div class="card">
  <div class="sec">คำนวณขนาดยา rt-PA (Alteplase 0.9 mg/kg)</div>
  <div style="margin-bottom:12px"><div class="lbl">น้ำหนักผู้ป่วย (kg)</div>
  <input type="number" value="${D.weight}" oninput="D.weight=this.value;updDose()" placeholder="เช่น 65" style="font-size:20px;font-weight:500"></div>
  <div id="doseResult">
  ${bw>0?`<div class="dose-grid">
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Total dose</div><div style="font-size:22px;font-weight:700">${td.toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg${bw>100?' (max 90)':''}</div></div>
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Bolus 10%</div><div style="font-size:22px;font-weight:700">${(td*.1).toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg IV push 1 นาที</div></div>
    <div class="dose-card" style="background:var(--ibg)"><div style="font-size:10px;color:var(--itx);margin-bottom:4px">Infusion 90%</div><div style="font-size:22px;font-weight:700;color:var(--itx)">${(td*.9).toFixed(1)}</div><div style="font-size:11px;color:var(--itx)">mg drip 60 นาที</div></div>
  </div>
  <div style="margin-top:8px;padding:10px 14px;background:var(--ibg);border-radius:var(--rm);font-size:12px;color:var(--itx)">
    <strong>Infusion pump / Syringe pump เท่านั้น</strong> — ไม่ผสมกับยาอื่น
  </div>`:`<div style="padding:20px;text-align:center;color:var(--tx2);background:var(--bg2);border-radius:var(--rm);font-size:13px">ป้อนน้ำหนักผู้ป่วยเพื่อคำนวณขนาดยา</div>`}
  </div></div>
  <div class="card"><div class="sec">ข้อควรระวัง</div>
  ${['ใช้ SWFI ละลายยา 1 mg/ml — ห้ามเจือจางด้วย Dextrose','ห้ามเขย่าขวด — หมุนหรือเอียงขวดช้าๆ','ห้ามผสมกับยาอื่นในขวดหรือสาย IV เดียวกัน','ความคงตัว: 24 ชม. ในตู้เย็น / 8 ชม. ที่ ≤25°C'].map(t=>`<div class="warn-row"><span style="color:var(--wtx)">⚠</span><span>${t}</span></div>`).join('')}
  </div>
  <div class="card"><div class="sec">รายงานแพทย์เมื่อ</div>
  ${['SBP >185 หรือ <110 mmHg','DBP >110 หรือ <60 mmHg','Pulse <50 bpm','Neurological sign เปลี่ยนแปลง (แย่ลง)','Internal bleeding: ปวดท้อง อาเจียนเลือด ถ่ายดำ ปัสสาวะมีเลือดปน'].map(t=>`<div class="warn-row"><span style="color:var(--dtx);font-weight:600">!</span><span>${t}</span></div>`).join('')}
  </div>
  <div class="card"><div class="sec">ถ้าสงสัย Intracranial Hemorrhage</div>
  ${['หยุดยา rt-PA ทันที','ส่ง CT brain NC ฉุกเฉิน','Repeat CBC, PT, PTT, INR','Cross matching FFP 6–8 units (หรือ 10 ml/kg)'].map((t,i)=>`<div class="warn-row"><div class="step-num">${i+1}</div><span>${t}</span></div>`).join('')}
  </div>
  <div class="card"><div class="sec">ห้ามใน 24 ชม. หลัง rt-PA</div>
  ${['Foley catheter','NG tube','Arterial puncture','IM injection','Antiplatelet / anticoagulant / antithrombotic'].map(t=>`<div class="warn-row"><span style="color:var(--dtx);font-weight:600">✗</span><span>${t}</span></div>`).join('')}
  </div>`;
}
window.updDose=function(){
  const bw=parseFloat(D.weight)||0;const td=bw?Math.min(bw*0.9,90):0;
  const el=document.getElementById('doseResult');
  if(!el)return;
  el.innerHTML=bw>0?`<div class="dose-grid">
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Total dose</div><div style="font-size:22px;font-weight:700">${td.toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg${bw>100?' (max 90)':''}</div></div>
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Bolus 10%</div><div style="font-size:22px;font-weight:700">${(td*.1).toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg IV push 1 นาที</div></div>
    <div class="dose-card" style="background:var(--ibg)"><div style="font-size:10px;color:var(--itx);margin-bottom:4px">Infusion 90%</div><div style="font-size:22px;font-weight:700;color:var(--itx)">${(td*.9).toFixed(1)}</div><div style="font-size:11px;color:var(--itx)">mg drip 60 นาที</div></div>
  </div>
  <div style="margin-top:8px;padding:10px 14px;background:var(--ibg);border-radius:var(--rm);font-size:12px;color:var(--itx)"><strong>Infusion pump / Syringe pump เท่านั้น</strong> — ไม่ผสมกับยาอื่น</div>`:
  `<div style="padding:20px;text-align:center;color:var(--tx2);background:var(--bg2);border-radius:var(--rm);font-size:13px">ป้อนน้ำหนักผู้ป่วยเพื่อคำนวณขนาดยา</div>`;
};

// ── TOGGLE (generic) ──
window.toggle=function(group,key){
  if(group==='befast')D.befast[key]=!D.befast[key];
  else if(group==='symp')D.symp[key]=!D.symp[key];
  else if(group==='incl')D.incl[key]=!D.incl[key];
  else if(group==='absX')D.absX[key]=!D.absX[key];
  else if(group==='relX')D.relX[key]=!D.relX[key];
  else if(group==='excl45')D.excl45[key]=!D.excl45[key];
  else if(group==='rel45')D.rel45[key]=!D.rel45[key];
  render();
};

// ── CLOCK ──
function tick(){
  const d=new Date();
  const el=document.getElementById('clockEl');
  if(el)el.textContent=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000);tick();

// ── INIT ──
render();
</script>
</body>
</html>
