<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Fast Tract — Menu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeece8;--tx:#1a1a18;--tx2:#6b6b67;
  --bl:#e5e3dc;--bm:#c8c6be;--rm:8px;--rl:12px;
  --sbg:#EAF3DE;--stx:#27500A;--sbd:#97C459;
  --wbg:#FAEEDA;--wtx:#633806;--wbd:#EF9F27;
  --dbg:#FCEBEB;--dtx:#791F1F;--dbd:#F09595;
  --ibg:#E6F1FB;--itx:#185FA5;--ibd:#85B7EB;
  --red:#C41E3A;
  --purple-bg:#EEEDFE;--purple-tx:#3C3489;--purple-bd:#AFA9EC;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#111110;--tx:#f0ede6;--tx2:#9a9893;
  --bl:#2e2e2b;--bm:#3a3a36;
  --sbg:#173404;--stx:#C0DD97;--sbd:#3B6D11;
  --wbg:#412402;--wtx:#FAC775;--wbd:#854F0B;
  --dbg:#501313;--dtx:#F7C1C1;--dbd:#A32D2D;
  --ibg:#042C53;--itx:#B5D4F4;--ibd:#185FA5;
  --purple-bg:#26215C;--purple-tx:#CECBF6;--purple-bd:#534AB7;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:var(--bg3);color:var(--tx);font-size:14px;min-height:100vh}
input,select,textarea{font-family:inherit;font-size:14px;padding:8px 10px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg);color:var(--tx);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bm);border-radius:4px}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bl);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tab-bar{display:flex;background:var(--bg);border-bottom:0.5px solid var(--bl);overflow-x:auto;position:sticky;top:57px;z-index:99;-webkit-overflow-scrolling:touch}
.tab-btn{padding:10px 16px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:13px;color:var(--tx2);white-space:nowrap;font-family:inherit}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:600}
.content{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.card{background:var(--bg);border:0.5px solid var(--bl);border-radius:var(--rl);padding:16px;margin-bottom:10px}

/* LAUNCH CARDS */
.launch-card{background:var(--bg);border-radius:var(--rl);padding:20px;display:flex;align-items:center;gap:16px;margin-bottom:10px;border:1px solid var(--bl);cursor:pointer;text-decoration:none;color:var(--tx);transition:box-shadow .15s,transform .1s}
.launch-card:active{transform:scale(.98)}
.launch-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.launch-title{font-size:16px;font-weight:700;margin-bottom:2px}
.launch-sub{font-size:12px;color:var(--tx2);line-height:1.5}
.launch-arrow{font-size:20px;color:var(--bm);margin-left:auto;flex-shrink:0}

/* GUIDELINE CARDS */
.gl-card{background:var(--bg);border:0.5px solid var(--bl);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.gl-title{font-size:14px;font-weight:700;margin-bottom:4px}
.gl-body{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:10px;white-space:pre-wrap}
.gl-cat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
.cat-nihss{background:#E6F1FB;color:#185FA5}
.cat-rtpa{background:#EAF3DE;color:#27500A}
.cat-refer{background:#FAEEDA;color:#633806}
.cat-general{background:var(--purple-bg);color:var(--purple-tx)}
.cat-protocol{background:#FCEBEB;color:#791F1F}
.link-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rm);font-size:12px;font-weight:600;text-decoration:none;border:0.5px solid;transition:opacity .1s;margin-right:6px;margin-top:4px}
.link-btn:active{opacity:.7}
.link-yt{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.link-gdrive{background:#EAF3DE;color:#27500A;border-color:#97C459}
.link-url{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.yt-embed{margin-top:10px;border-radius:var(--rm);overflow:hidden;aspect-ratio:16/9;background:#000}
.yt-embed iframe{width:100%;height:100%;border:none}

/* FORMS */
.sec{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}
.form-row{margin-bottom:12px}
.btn-red{padding:11px 20px;border:none;border-radius:var(--rl);background:var(--red);color:white;font-size:14px;font-weight:700;font-family:inherit}
.btn-gray{padding:9px 16px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--tx);font-size:13px;font-family:inherit}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip-sel{padding:5px 12px;border-radius:10px;border:1px solid var(--bm);font-size:12px;cursor:pointer;background:var(--bg2);color:var(--tx)}
.chip-sel.on{background:var(--red);border-color:var(--red);color:white;font-weight:600}

/* PIN MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center}
.pdots{display:flex;justify-content:center;gap:12px;margin:14px 0}
.pd{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--bm)}
.pd.f{background:var(--red);border-color:#8B1225}
.pd.e{animation:sh .3s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;max-width:240px;margin-left:auto;margin-right:auto}
.pbtn{padding:12px;border:0.5px solid var(--bm);border-radius:10px;background:var(--bg2);font-size:18px;font-weight:500;color:var(--tx)}
.pbtn:active{background:var(--bl);transform:scale(.95)}

/* SETUP TURSO */
.setup-box{background:var(--wbg);border:0.5px solid var(--wbd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.empty-state{text-align:center;padding:40px 20px;color:var(--tx2)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--bl);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;display:inline-block;margin-left:6px}
</style>
</head>
<body>

<script>
// ── CONFIG (saved in localStorage) ──
function getCfg(){
  try{return JSON.parse(localStorage.getItem('stroke_menu_cfg')||'{}');}catch{return {};}
}
function saveCfg(c){localStorage.setItem('stroke_menu_cfg',JSON.stringify(c));}

// Staff file paths (same folder assumed)
const STAFF_FILE='stroke_staff_wizard.html';
const GUEST_FILE='stroke_guest.html';

setInterval(()=>{const d=new Date();const el=document.getElementById('clockEl');if(el)el.textContent=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);

let currentTab='home';
function switchTab(t,btn){
  currentTab=t;

    window.open('/stroke_admin.html','_blank','noopener');
    currentTab='home';
    const homeBtn=document.querySelectorAll('.tab-btn')[0];
    if(homeBtn)homeBtn.classList.add('active');
  }
  render();
}

function render(){
  const fns={home:rHome,guidelines:rGuidelines,videos:rVideos,admin:rAdmin};
  document.getElementById('content').innerHTML=(fns[currentTab]||rHome)();
  if(currentTab==='guidelines')setTimeout(loadAndShowGl,0);
  if(currentTab==='videos')setTimeout(loadAndShowVid,0);
  if(currentTab==='admin')setTimeout(loadAdminLists,0);
}

// ── TURSO API ──
async function tursoQuery(sql,args=[]){
  try{
    const r=await fetch('/turso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql,args})});
    if(!r.ok && r.status===503){return{error:'Turso ยังไม่ได้ตั้งค่า — เพิ่ม TURSO_URL และ TURSO_TOKEN ใน Cloudflare Pages Environment Variables'};}
    const d=await r.json();
    if(d.error)return{error:d.error};
    if(d.results?.[0]?.type==='error')return{error:d.results[0].error.message};
    const rows=d.results?.[0]?.response?.result?.rows||[];
    const cols=d.results?.[0]?.response?.result?.cols||[];
    return{rows:rows.map(row=>Object.fromEntries(cols.map((c,i)=>([c.name,row[i].value]))))};
  }catch(e){return{error:e.message};}
}


// ── GUIDELINES TAB ──
let glData=null;
function tursoErrorHtml(msg){
  return `<div class="empty-state">
    <div style="font-size:36px;margin-bottom:10px">📋</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">ไม่มีข้อมูลจาก Turso</div>
    <div style="font-size:12px;color:var(--tx2);max-width:280px;line-height:1.6">${msg}</div>
    <div style="font-size:11px;color:var(--tx2);margin-top:12px">ถ้าไม่ได้ใช้ Turso สามารถข้ามได้ — ใช้แอปได้ตามปกติ</div>
  </div>`;
}

async function loadGuidelines(){
  const createResult=await tursoQuery(`CREATE TABLE IF NOT EXISTS guidelines (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    category TEXT NOT NULL DEFAULT 'general',
    title TEXT NOT NULL,
    body TEXT,
    link_url TEXT,
    link_type TEXT,
    link_label TEXT,
    sort_order INTEGER DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )`);
  if(createResult.error)return{error:createResult.error};
  const r=await tursoQuery("SELECT * FROM guidelines WHERE link_type != 'youtube' OR link_type IS NULL ORDER BY sort_order ASC, created_at DESC");
  if(r.error)return{error:r.error};
  return{rows:r.rows||[]};
}

function rGuidelines(){
  return `<div id="glContent"><div class="empty-state"><div class="spin"></div><div style="margin-top:10px;font-size:12px">กำลังโหลด...</div></div></div>`;
}

async function loadAndShowGl(){
  const el=document.getElementById('glContent');
  if(!el)return;
  const result=await loadGuidelines();
  if(result.error){el.innerHTML=tursoErrorHtml(result.error);return;}
  const rows=result.rows;
  if(rows.length===0){el.innerHTML=glEmptyWithAdd();return;}
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:12px;color:var(--tx2)">${rows.length} รายการ</div>
<span style="font-size:11px;color:var(--tx2)">แก้ไขได้ที่ ⚙️ จัดการ</span>
  </div>
  ${rows.map(r=>glCard(r)).join('')}`;
}

function catLabel(c){const m={nihss:'NIHSS',rtpa:'rt-PA',refer:'Refer',protocol:'Protocol',general:'ทั่วไป'};return m[c]||c;}
function catClass(c){const m={nihss:'cat-nihss',rtpa:'cat-rtpa',refer:'cat-refer',protocol:'cat-protocol',general:'cat-general'};return m[c]||'cat-general';}
function linkTypeIcon(t){return t==='youtube'?'▶ YouTube':t==='gdrive'?'📂 Google Drive':'🔗 เปิดลิงก์';}
function linkClass(t){return t==='youtube'?'link-yt':t==='gdrive'?'link-gdrive':'link-url';}

function glCard(r){
  return `<div class="gl-card" id="glcard-${r.id}">
    <div class="gl-cat ${catClass(r.category)}">${catLabel(r.category)}</div>
    <div class="gl-title">${r.title||''}</div>
    ${r.body?`<div class="gl-body">${r.body}</div>`:''}
    ${r.link_url?`<a href="${r.link_url}" target="_blank" class="link-btn ${linkClass(r.link_type)}">${linkTypeIcon(r.link_type)}${r.link_label?' — '+r.link_label:''}</a>`:''}

  </div>`;}

function glEmptyWithAdd(){

// ── Admin AI Chat ────────────────────────────────────────────────────────
let adminChatHistory = [];

window.quickQ = function(q){
  document.getElementById('aiChatInput').value = q;
  sendAdminChat();
};

window.sendAdminChat = async function(){
  const input = document.getElementById('aiChatInput');
  const q = input?.value?.trim();
  if(!q) return;
  input.value = '';

  // Show user bubble
  appendChatBubble('user', q);

  // Show typing
  const typingId = 'typing-' + Date.now();
  appendChatBubble('typing', '', typingId);

  // Fetch case log summary for context
  const caseData = await fetchCaseLogSummary();

  adminChatHistory.push({ role: 'user', content: q });

  try{
    const r = await fetch('/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: adminChatHistory,
        system: buildAdminSystemPrompt(caseData),
        max_tokens: 800
      })
    });
    let d;
    try { d = await r.json(); } catch(_) { d = {}; }
    if (!d || typeof d !== 'object') d = {};
    const answer = (d && (d.content?.[0]?.text || d.choices?.[0]?.message?.content || d.error)) || (!r.ok ? (d.error || `เซิร์ฟเวอร์ตอบกลับ ${r.status}`) : 'ไม่ได้รับคำตอบ');

    // Remove typing bubble
    document.getElementById(typingId)?.remove();

    // Show answer
    appendChatBubble('ai', String(answer));
    adminChatHistory.push({ role: 'assistant', content: answer });

    // Keep history max 10 turns
    if(adminChatHistory.length > 20) adminChatHistory = adminChatHistory.slice(-20);

  } catch(e) {
    document.getElementById(typingId)?.remove();
    appendChatBubble('ai', `ไม่สามารถเชื่อมต่อได้: ${e && e.message || 'Unknown error'}`);
  }
};

function appendChatBubble(role, text, id=''){
  const box = document.getElementById('aiChatHistory');
  if(!box) return;
  const div = document.createElement('div');
  if(id) div.id = id;
  if(role === 'user'){
    div.style.cssText = 'align-self:flex-end;background:var(--red);color:white;padding:8px 12px;border-radius:12px 12px 2px 12px;font-size:13px;max-width:80%;line-height:1.5';
    div.textContent = text;
  } else if(role === 'typing'){
    div.style.cssText = 'align-self:flex-start;background:var(--bg2);border:0.5px solid var(--bl);padding:10px 14px;border-radius:12px 12px 12px 2px;display:flex;gap:5px;align-items:center';
    div.innerHTML = '<div class="ai-dot" style="width:7px;height:7px;border-radius:50%;background:var(--bm);animation:bo 1.2s infinite"></div><div class="ai-dot" style="width:7px;height:7px;border-radius:50%;background:var(--bm);animation:bo 1.2s .2s infinite"></div><div class="ai-dot" style="width:7px;height:7px;border-radius:50%;background:var(--bm);animation:bo 1.2s .4s infinite"></div>';
  } else {
    div.style.cssText = 'align-self:flex-start;background:var(--bg2);border:0.5px solid var(--bl);padding:10px 14px;border-radius:12px 12px 12px 2px;font-size:13px;max-width:92%;line-height:1.7;white-space:pre-wrap';
    div.textContent = text;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function fetchCaseLogSummary(){
  try{
    const r = await tursoQuery(`
      SELECT
        COUNT(*) as total,
        SUM(rtpa_given) as rtpa_n,
        SUM(referred) as refer_n,
        ROUND(AVG(nihss_score),1) as avg_nihss,
        ROUND(AVG(CASE WHEN dtn_min > 0 THEN dtn_min END),0) as avg_dtn,
        SUM(CASE WHEN dtn_min <= 60 THEN 1 ELSE 0 END) as dtn_ok,
        SUM(CASE WHEN ct_result='ich' THEN 1 ELSE 0 END) as ich_n,
        MIN(logged_at) as first_case,
        MAX(logged_at) as last_case
      FROM case_log`);
    if(r.error || !r.rows?.length) return null;
    const s = r.rows[0];
    // Turso returns all values as strings — coerce to numbers
    const total   = Number(s.total   || 0);
    const rtpa_n  = Number(s.rtpa_n  || 0);
    const refer_n = Number(s.refer_n || 0);
    const ich_n   = Number(s.ich_n   || 0);
    const dtn_ok  = Number(s.dtn_ok  || 0);
    const avg_nihss = s.avg_nihss ? Number(s.avg_nihss).toFixed(1) : 'ไม่มีข้อมูล';
    const avg_dtn   = s.avg_dtn   ? Math.round(Number(s.avg_dtn))  : 'ไม่มีข้อมูล';
    const first_c = s.first_case?.substring(0,10) || '?';
    const last_c  = s.last_case?.substring(0,10)  || '?';
    if(total === 0) return 'ยังไม่มีข้อมูล Case Log — กรณีที่บันทึกไว้จะแสดงที่นี่หลังจาก Staff สร้าง PDF ครั้งแรก';
    return `ข้อมูล Case Log รพ.สงฆ์:
- รวมทั้งหมด: ${total} เคส (${first_c} ถึง ${last_c})
- ให้ rt-PA: ${rtpa_n} เคส (${total>0?Math.round(rtpa_n/total*100):0}%)
- Refer: ${refer_n} เคส (${total>0?Math.round(refer_n/total*100):0}%)
- Hemorrhagic stroke: ${ich_n} เคส
- NIHSS เฉลี่ย: ${avg_nihss}
- DTN เฉลี่ย: ${avg_dtn} นาที
- DTN ≤60 นาที: ${dtn_ok} จาก ${rtpa_n} เคส rt-PA`;
  } catch(e){ console.error('fetchCaseLogSummary error:', e); return null; }
}

สรุปข้อมูล Case Log:
${caseData}
──────────────────────────────────`
    : `

(ยังไม่มีข้อมูล Case Log หรือเชื่อมต่อ Turso ไม่ได้)`;

  return `คุณคือผู้ช่วยข้อมูลของทีมแพทย์โรงพยาบาลสงฆ์ สำหรับ Admin เท่านั้น

กฎเคร่งครัด:
1. ตอบได้เฉพาะ 2 เรื่องนี้เท่านั้น:
   ก) Guideline และ Protocol ที่บันทึกไว้ใน Turso (จะถูก inject อัตโนมัติ)
   ข) ข้อมูลสรุป Case Log ที่ให้ไว้ด้านล่าง
2. ถ้าถามเรื่องนอกขอบเขตนี้ ให้ตอบว่า "ข้อมูลส่วนนี้ไม่ได้อยู่ใน Guideline หรือ Case Log ที่บันทึกไว้"
3. ห้ามวินิจฉัยโรค ห้ามแนะนำการรักษาเฉพาะผู้ป่วย
4. ห้ามอ้างอิงความรู้นอกเหนือจากที่ให้ไว้ ถ้าไม่มีใน Guideline ให้บอกตรงๆ
5. ตอบเป็นภาษาไทย กระชับ อ้างอิงชื่อหัวข้อ Guideline ที่ใช้${caseSection}`;
}

// ── ASPECT Links Admin (index.html side) ─────────────────────────────────
const ASPECT_KEY = 'aspect_links';
const ASPECT_DEFAULTS = [
  {label:'MDCalc ASPECT', url:'https://www.mdcalc.com/calc/3164/alberta-stroke-program-early-ct-score-aspects'},
  {label:'RadAtHand Calculator', url:'https://radathand.com/radiology-calculators/neuroradiology/aspects-score-calculator/'},
];

function getAspectLinksAdmin(){
  try{return JSON.parse(localStorage.getItem(ASPECT_KEY)||'null')||ASPECT_DEFAULTS;}
  catch{return ASPECT_DEFAULTS;}
}

async function ensureSettingsTable(){
  await tursoQuery(`CREATE TABLE IF NOT EXISTS settings (key TEXT PRIMARY KEY, value TEXT)`);
}
async function loadAspectAdmin(){
  const el=document.getElementById('aspectLinkList');
  if(!el)return;
  await ensureSettingsTable();
  const r=await tursoQuery("SELECT value FROM settings WHERE key='aspect_links' LIMIT 1");
  if(!r.error&&r.rows?.[0]?.value){
    try{
      const arr=JSON.parse(r.rows[0].value);
      if(Array.isArray(arr)&&arr.length)localStorage.setItem(ASPECT_KEY,JSON.stringify(arr));
    }catch(_){}
  }
  renderAspectLinks();
}

function renderAspectLinks(){
  const el=document.getElementById('aspectLinkList');
  if(!el)return;
  document.getElementById('aspectForm')?.remove();
  const links=getAspectLinksAdmin();
  if(links.length===0){
    el.innerHTML='<div style="font-size:12px;color:var(--tx2);padding:8px 0">ยังไม่มีลิงก์ — กดปุ่ม + เพิ่มลิงก์</div>';
    return;
  }
  el.innerHTML=links.map((l,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bl)">
    <div style="flex:1"><a href="${l.url}" target="_blank" rel="noopener" style="font-size:13px;color:var(--itx)">${escapeHtml(l.label)}</a></div>
    <button type="button" onclick="requirePin(()=>showAspectForm(${i}))" style="padding:4px 10px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);font-size:11px;font-family:inherit">แก้ไข</button>
    <button type="button" onclick="requirePin(()=>delAspectLink(${i}))" style="padding:4px 10px;border:0.5px solid var(--dbd);border-radius:var(--rm);background:var(--dbg);font-size:11px;color:var(--dtx);font-family:inherit">ลบ</button>
  </div>`).join('');
}

function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function showAspectForm(editIdx){
  document.getElementById('aspectForm')?.remove();
  const links=getAspectLinksAdmin();
  const item=editIdx>=0&&editIdx<links.length?links[editIdx]:{label:'',url:''};
  const form=document.createElement('div');
  form.id='aspectForm';
  form.style.cssText='padding:10px 0;margin-top:8px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);padding:12px;';
  form.innerHTML=`
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">${editIdx>=0?'แก้ไขลิงก์':'เพิ่มลิงก์ใหม่'}</div>
    <div class="form-row"><div class="lbl">ชื่อ</div><input id="aLink_label" value="${escapeHtml(item.label)}" placeholder="เช่น MDCalc ASPECT" style="flex:1"></div>
    <div class="form-row"><div class="lbl">URL</div><input id="aLink_url" value="${escapeHtml(item.url)}" placeholder="https://..." style="flex:1"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button type="button" onclick="document.getElementById('aspectForm').remove();renderAspectLinks();" style="padding:6px 12px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);font-size:12px;font-family:inherit">ยกเลิก</button>
      <button type="button" onclick="saveAspectLink(${editIdx>=0?editIdx:-1})" style="padding:6px 12px;border:0;border-radius:var(--rm);background:var(--red);color:#fff;font-size:12px;font-family:inherit">บันทึก</button>
    </div>`;
  document.getElementById('aspectLinkList').appendChild(form);
}

function delAspectLink(idx){
  if(!confirm('ลบลิงก์นี้?'))return;
  const links=getAspectLinksAdmin();
  if(idx>=0&&idx<links.length){
    links.splice(idx,1);
    localStorage.setItem(ASPECT_KEY,JSON.stringify(links));
    renderAspectLinks();
    saveAspectLinksTurso(links);
  }
}

window.addAspectLink=function(){requirePin(()=>showAspectForm(-1));};

// ── LINE Users Admin ──────────────────────────────────────────────────────


window.saveAspectLink=async function(idx){
  const label=document.getElementById('aLink_label')?.value?.trim();
  const url=document.getElementById('aLink_url')?.value?.trim();
  if(!label||!url){alert('กรุณากรอกชื่อและ URL');return;}
  const links=getAspectLinksAdmin();
  if(idx>=0&&idx<links.length)links[idx]={label,url};
  else links.push({label,url});
  localStorage.setItem(ASPECT_KEY,JSON.stringify(links));
  document.getElementById('aspectForm')?.remove();
  renderAspectLinks();
  await saveAspectLinksTurso(links);
};
async function saveAspectLinksTurso(links){
  const st=document.getElementById('aspectSaveStatus');
  if(st){st.textContent='กำลังบันทึก...';st.style.color='var(--tx2)';}
  await ensureSettingsTable();
  const r=await tursoQuery(
    "INSERT INTO settings(key,value) VALUES('aspect_links',?) ON CONFLICT(key) DO UPDATE SET value=excluded.value",
    [JSON.stringify(links)]
  );
  if(st){
    st.textContent=r.error?'❌ Turso error: '+r.error:'✓ บันทึกแล้ว — Staff Wizard จะใช้ลิงก์ใหม่ทันที';
    st.style.color=r.error?'var(--dtx)':'var(--stx)';
    setTimeout(()=>{if(st)st.textContent='';},3000);
  }
}
