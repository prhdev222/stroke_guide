<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Clinical Tools — Guest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeece8;--tx:#1a1a18;--tx2:#6b6b67;
  --bl:#e5e3dc;--bm:#c8c6be;--rm:8px;--rl:12px;
  --sbg:#EAF3DE;--stx:#27500A;--sbd:#97C459;
  --wbg:#FAEEDA;--wtx:#633806;--wbd:#EF9F27;
  --dbg:#FCEBEB;--dtx:#791F1F;--dbd:#F09595;
  --ibg:#E6F1FB;--itx:#185FA5;--ibd:#85B7EB;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#111110;--tx:#f0ede6;--tx2:#9a9893;
  --bl:#2e2e2b;--bm:#3a3a36;
  --sbg:#173404;--stx:#C0DD97;--sbd:#3B6D11;
  --wbg:#412402;--wtx:#FAC775;--wbd:#854F0B;
  --dbg:#501313;--dtx:#F7C1C1;--dbd:#A32D2D;
  --ibg:#042C53;--itx:#B5D4F4;--ibd:#185FA5;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:var(--bg3);color:var(--tx);font-size:14px;min-height:100vh}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg);color:var(--tx);width:100%;outline:none}
input:focus,select:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bm);border-radius:4px}

.topbar{background:var(--bg);border-bottom:0.5px solid var(--bl);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.guest-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--sbg);color:var(--stx);border:0.5px solid var(--sbd);font-weight:600}
.nihss-badge{padding:5px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;position:sticky;top:57px;z-index:99;transition:all .3s}
.tab-bar{display:flex;background:var(--bg);border-bottom:0.5px solid var(--bl);overflow-x:auto;position:sticky;z-index:98;-webkit-overflow-scrolling:touch}
.tab-btn{padding:11px 14px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:13px;color:var(--tx2);white-space:nowrap;font-family:inherit;transition:color .15s,border-color .15s}
.tab-btn.active{color:#639922;border-bottom-color:#639922;font-weight:600}
.content{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.card{background:var(--bg);border:0.5px solid var(--bl);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.sec{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.sec-sub{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}

/* BF chips */
.bf-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--rm);margin-bottom:7px;cursor:pointer;user-select:none;border:0.5px solid var(--bl);background:var(--bg2);transition:all .1s}
.bf-row.on{background:var(--sbg);border-color:var(--sbd)}
.bf-letter{width:30px;height:30px;border-radius:var(--rm);border:0.5px solid var(--bm);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--tx2);flex-shrink:0;transition:all .1s}
.bf-letter.on{background:#639922;border-color:#3B6D11;color:white}
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sym-chip{padding:9px 10px;border-radius:var(--rm);border:0.5px solid var(--bl);background:var(--bg2);cursor:pointer;user-select:none;font-size:13px;display:flex;align-items:center;gap:7px;transition:all .1s}
.sym-chip.on{background:var(--sbg);border-color:var(--sbd);color:var(--stx)}
.chip-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--bm);flex-shrink:0;transition:all .1s}
.sym-chip.on .chip-dot{background:#639922;border-color:#3B6D11}

/* Checklist — mobile-friendly: box + text ไม่ทับกัน */
.ck-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rm);margin-bottom:6px;cursor:pointer;user-select:none;border:0.5px solid var(--bl);background:var(--bg2);min-height:44px;box-sizing:border-box}
.ck-row.ok{background:var(--sbg);border-color:var(--sbd)}
.ck-row.bad{background:var(--dbg);border-color:var(--dbd)}
.ck-row label{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer;margin:0;font-size:13px;line-height:1.4}
.ck-row .ckbox{width:22px;height:22px;min-width:22px;min-height:22px;border-radius:4px;border:1.5px solid var(--bm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin:0}
.ck-row .ckbox.ok{background:#639922;border-color:#3B6D11;color:white}
.ck-row .ckbox.bad{background:#C41E3A;border-color:#8B1225;color:white}
.ck-row .ckbox.on{background:var(--accent);border-color:var(--accent);color:white}
.ck-row .ck-text{flex:1;min-width:0;word-break:break-word}
.ck-row .ck-badge{flex-shrink:0;font-size:11px;color:var(--tx2)}
.ck-row input[type=checkbox]{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.aspect-btn{min-width:36px;height:36px;border-radius:var(--rm);border:1.5px solid var(--bm);background:var(--bg2);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer}
.aspect-btn.on{background:var(--accent);border-color:var(--accent);color:white}
.link-pill{display:inline-block;padding:6px 12px;border-radius:999px;background:var(--ibg);color:var(--itx);text-decoration:none;font-size:12px}
.link-pill:hover{opacity:0.9}
@media (max-width:480px){
  .ck-row{padding:12px 14px;gap:12px;min-height:48px}
  .ck-row .ckbox{width:24px;height:24px;min-width:24px;min-height:24px;font-size:13px}
  .ck-row label{font-size:14px}
}
.dec-box{padding:12px 16px;border-radius:var(--rl);text-align:center;font-size:14px;font-weight:700;border:1.5px solid;margin-top:6px}

/* NIHSS */
.score-ring{display:flex;align-items:center;gap:14px;padding:14px;border-radius:var(--rl);margin-bottom:10px;border:1.5px solid;position:sticky;top:57px;z-index:90}
.ring{width:70px;height:70px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.nihss-item{position:relative;margin-bottom:10px;padding:12px;background:var(--bg2);border-radius:var(--rm);border:0.5px solid var(--bl)}
.nihss-desc{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--rm);border:0.5px solid var(--bl)}
.nihss-desc-lang{display:inline-block;margin-right:8px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;margin-bottom:4px}
.nihss-desc-lang.active{background:var(--ibg);color:var(--itx);border:0.5px solid var(--ibd)}
.nihss-desc-lang:not(.active){background:var(--bg3);color:var(--tx2);border:0.5px solid var(--bm)}
.nihss-desc-en{display:none}
.nihss-lang-en .nihss-desc-th{display:none}
.nihss-lang-en .nihss-desc-en{display:block}
.nihss-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.nihss-btn{padding:5px 11px;border-radius:6px;border:0.5px solid var(--bm);background:var(--bg);font-size:13px;color:var(--tx);cursor:pointer;transition:all .1s}
.nihss-btn.s0{background:var(--sbg);border-color:var(--sbd);color:var(--stx);font-weight:600}
.nihss-btn.sw{background:var(--wbg);border-color:var(--wbd);color:var(--wtx);font-weight:600}
.nihss-btn.sd{background:var(--dbg);border-color:var(--dbd);color:var(--dtx);font-weight:600}

/* rt-PA */
.dose-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.dose-card{background:var(--bg2);border-radius:var(--rm);padding:10px;text-align:center}
.warn-row{display:flex;gap:8px;margin-bottom:7px;font-size:13px;align-items:flex-start}
.step-num{width:19px;height:19px;border-radius:50%;background:var(--dbg);color:var(--dtx);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
</style>
</head>
<body>

<div id="topbar" class="topbar">
  <div>
    <div style="font-size:13px;font-weight:700">Stroke Clinical Tools</div>
    <div style="font-size:10px;color:var(--tx2)">โรงพยาบาลสงฆ์</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="clockEl" style="font-size:12px;font-variant-numeric:tabular-nums;color:var(--tx2)"></div>
    <span class="guest-tag">⚡ Guest</span>
  </div>
</div>

<div id="nihssBadge" style="display:none" class="nihss-badge"></div>

<div class="tab-bar" id="tabBar" style="top:57px">
  <button class="tab-btn active" onclick="switchTab('befast',this)">BEFAST</button>
  <button class="tab-btn" onclick="switchTab('criteria',this)">Checklist</button>
  <button class="tab-btn" onclick="switchTab('nihss',this)">NIHSS</button>
  <button class="tab-btn" onclick="switchTab('aspectlvo',this)">ASPECT & LVO</button>
  <button class="tab-btn" onclick="switchTab('rtpa',this)">rt-PA</button>
</div>

<div class="content" id="content"></div>

<script>
// ── STATE ──
let currentTab='befast';
let D={
  befast:{B:false,E:false,F:false,A:false,S:false},
  symp:{hemi:false,numb:false,comm:false,dys:false,vis:false,drow:false,atax:false},
  incl:{ais:false,o45:false,a18:false},
  absX:{},relX:{},excl45:{n25:false,i17:false},rel45:{a80:false,sdm:false},
  nihss:{},
  aspect:undefined,
  lvoSigns:{},
  thromboIncl:{},
  thromboExcl:{},
  weight:'',
};

const NIHSS=[
  {id:'1a',th:'1a. ระดับความรู้สึกตัว (LOC)',en:'1a. Level of Consciousness',descTh:'ประเมินระดับการตื่น (arousal) และการตอบสนอง — ตื่นดี / ง่วงแต่ปลุกได้ / ต้องกระตุ้นซ้ำจึงตอบสนอง / ไม่ตอบสนอง',descEn:'Assess level of arousal and responsiveness. Alert / Drowsy but arousable / Requires repeated stimulation / Unresponsive.',opts:[{v:0,th:'ตื่นดี',en:'Alert'},{v:1,th:'ง่วง/ปลุกได้',en:'Drowsy'},{v:2,th:'ต้องกระตุ้นซ้ำ',en:'Repeated stimulation'},{v:3,th:'ไม่ตอบสนอง',en:'Unresponsive'}]},
  {id:'1b',th:'1b. LOC คำถาม (เดือน/อายุ)',en:'1b. LOC Questions (month, age)',descTh:'ถามผู้ป่วยว่า «ตอนนี้เดือนอะไร» และ «อายุเท่าไร» — ให้คะแนนตามจำนวนที่ตอบถูก (2 / 1 / 0)',descEn:'Ask patient: «What month is it?» and «How old are you?» Score 2 = both correct, 1 = one correct, 0 = none.',opts:[{v:0,th:'ถูก 2',en:'Both correct'},{v:1,th:'ถูก 1',en:'One correct'},{v:2,th:'ถูก 0',en:'None'}]},
  {id:'1c',th:'1c. LOC คำสั่ง (กำมือ/หลับตา)',en:'1c. LOC Commands (eyes, grip)',descTh:'สั่งให้ «หลับตา» «เปิดตา» «กำมือ» «แบมือ» — ทำได้ครบ 2 อย่าง / 1 อย่าง / 0',descEn:'Ask to open/close eyes, grip/release hand. Score 2 = both done, 1 = one, 0 = none.',opts:[{v:0,th:'ทำ 2',en:'Both'},{v:1,th:'ทำ 1',en:'One'},{v:2,th:'ทำ 0',en:'None'}]},
  {id:'2',th:'2. การมองตาม (Gaze)',en:'2. Best Gaze',descTh:'ให้มองตามนิ้วแพทย์ทางแนวนอน — ปกติ / พิการบางส่วน (full horizontal movement ไม่ครบ) / ลูกตาเบนไปด้านหนึ่งชัดเจน (forced deviation)',descEn:'Horizontal eye tracking. Normal / Partial gaze palsy (reduced but full range) / Forced deviation (total gaze palsy).',opts:[{v:0,th:'ปกติ',en:'Normal'},{v:1,th:'Partial palsy',en:'Partial'},{v:2,th:'Forced deviation',en:'Forced deviation'}]},
  {id:'3',th:'3. การมองเห็น (Visual)',en:'3. Visual',descTh:'ตรวจลานสายตา (visual fields) — ปกติ / บอดครึ่งหนึ่งบางส่วน / บอดครึ่งหนึ่งสมบูรณ์ / บอดทั้งสองข้าง',descEn:'Visual field testing. No visual loss / Partial hemianopia / Complete hemianopia / Bilateral hemianopia.',opts:[{v:0,th:'ปกติ',en:'No loss'},{v:1,th:'Partial hemianopia',en:'Partial'},{v:2,th:'Complete hemianopia',en:'Complete'},{v:3,th:'Bilateral hemianopia',en:'Bilateral'}]},
  {id:'4',th:'4. ใบหน้า (Facial Palsy)',en:'4. Facial Palsy',descTh:'ประเมินอ่อนแรงใบหน้า (ปากเบี้ยว หลับตาอ่อนแรง) — ปกติ / เล็กน้อย / พิการบางส่วน (ครึ่งล่างชัด) / พิการสมบูรณ์',descEn:'Facial weakness. Normal / Minor paralysis / Partial (lower face) / Complete paralysis.',opts:[{v:0,th:'ปกติ',en:'Normal'},{v:1,th:'Minor',en:'Minor'},{v:2,th:'Partial (ล่าง)',en:'Partial'},{v:3,th:'Complete',en:'Complete'}]},
  {id:'5a',th:'5a. แขนซ้าย (90° / 10 วิ)',en:'5a. Motor Arm Left',descTh:'ยกแขนข้างที่อ่อนแรง 90° (นอน) หรือ 45° (นั่ง) ค้าง 10 วินาที — ไม่ drift / drift ก่อน 10 วิ / ต้านแรงได้บ้าง / ต้านแรงไม่ได้ / ไม่ยกได้',descEn:'Hold left arm at 90° (supine) or 45° (sitting) for 10 sec. No drift / Drift before 10 sec / Some effort vs gravity / No effort / No movement.',opts:[{v:0,th:'ไม่ drift',en:'No drift'},{v:1,th:'Drift',en:'Drift'},{v:2,th:'ต้านแรงบ้าง',en:'Some effort'},{v:3,th:'ต้านไม่ได้',en:'No effort'},{v:4,th:'ไม่เคลื่อน',en:'No movement'}]},
  {id:'5b',th:'5b. แขนขวา (90° / 10 วิ)',en:'5b. Motor Arm Right',descTh:'ยกแขนข้างที่อ่อนแรง 90° (นอน) หรือ 45° (นั่ง) ค้าง 10 วินาที — เกณฑ์เดียวกับ 5a',descEn:'Same as 5a for right arm. Hold 90° or 45° for 10 sec.',opts:[{v:0,th:'ไม่ drift',en:'No drift'},{v:1,th:'Drift',en:'Drift'},{v:2,th:'ต้านแรงบ้าง',en:'Some effort'},{v:3,th:'ต้านไม่ได้',en:'No effort'},{v:4,th:'ไม่เคลื่อน',en:'No movement'}]},
  {id:'6a',th:'6a. ขาซ้าย (30° / 5 วิ)',en:'6a. Motor Leg Left',descTh:'ยกขาข้างที่อ่อนแรง 30° ค้าง 5 วินาที — ไม่ drift / drift ก่อน 5 วิ / ต้านแรงได้บ้าง / ต้านไม่ได้ / ไม่ยกได้',descEn:'Hold left leg at 30° for 5 sec. No drift / Drift / Some effort / No effort / No movement.',opts:[{v:0,th:'ไม่ drift',en:'No drift'},{v:1,th:'Drift',en:'Drift'},{v:2,th:'ต้านแรงบ้าง',en:'Some effort'},{v:3,th:'ต้านไม่ได้',en:'No effort'},{v:4,th:'ไม่เคลื่อน',en:'No movement'}]},
  {id:'6b',th:'6b. ขาขวา (30° / 5 วิ)',en:'6b. Motor Leg Right',descTh:'ยกขาข้างที่อ่อนแรง 30° ค้าง 5 วินาที — เกณฑ์เดียวกับ 6a',descEn:'Same as 6a for right leg. Hold 30° for 5 sec.',opts:[{v:0,th:'ไม่ drift',en:'No drift'},{v:1,th:'Drift',en:'Drift'},{v:2,th:'ต้านแรงบ้าง',en:'Some effort'},{v:3,th:'ต้านไม่ได้',en:'No effort'},{v:4,th:'ไม่เคลื่อน',en:'No movement'}]},
  {id:'7',th:'7. Limb Ataxia (การเคลื่อนไหวไม่ประสาน)',en:'7. Limb Ataxia',descTh:'ตรวจ finger-nose และ heel-shin — ไม่มี ataxia / มีที่แขนหรือขาข้างใดข้างหนึ่ง / มีทั้งสองข้าง (ให้คะแนนเฉพาะเมื่อไม่ใช่จากอ่อนแรงหรือความรู้สึกเสีย)',descEn:'Finger-nose and heel-shin. No ataxia / Ataxia in one limb / Ataxia in two limbs. Score only if not due to weakness or sensory loss.',opts:[{v:0,th:'ไม่มี',en:'None'},{v:1,th:'มี 1 ข้าง',en:'One limb'},{v:2,th:'มี 2 ข้าง',en:'Two limbs'}]},
  {id:'8',th:'8. ความรู้สึก (Sensory)',en:'8. Sensory',descTh:'ตรวจความรู้สึกสัมผัส/เข็มที่หน้า แขน ขา — ปกติ / ลดลงบ้าง / หมดความรู้สึกหรือไม่รู้สึกที่ด้านใดด้านหนึ่ง',descEn:'Pinprick and light touch on face, arm, leg. Normal / Mild to moderate decrease / Severe decrease or total loss.',opts:[{v:0,th:'ปกติ',en:'Normal'},{v:1,th:'ลดลงบ้าง',en:'Mild-moderate'},{v:2,th:'หมด/รุนแรง',en:'Severe/total loss'}]},
  {id:'9',th:'9. การพูด/ภาษา (Language)',en:'9. Best Language',descTh:'ให้ตั้งชื่อรูป อ่านประโยค ตอบคำถาม — ปกติ / aphasia เล็กน้อย-ปานกลาง / aphasia รุนแรง (สื่อสารได้น้อยมาก) / Mute หรือ global aphasia',descEn:'Name objects, read sentences, describe picture. No aphasia / Mild-moderate aphasia / Severe aphasia / Mute or global aphasia.',opts:[{v:0,th:'ปกติ',en:'No aphasia'},{v:1,th:'Mild aphasia',en:'Mild-moderate'},{v:2,th:'Severe aphasia',en:'Severe'},{v:3,th:'Mute/Global',en:'Mute/Global'}]},
  {id:'10',th:'10. การออกเสียง (Dysarthria)',en:'10. Dysarthria',descTh:'ประเมินความชัดของการออกเสียง (articulation) จากคำหรือประโยคที่อ่าน — ปกติ / ไม่ชัดเล็กน้อย-ปานกลาง / ไม่ชัดมากจนฟังไม่เข้าใจ',descEn:'Articulation and intelligibility. Normal / Mild to moderate slurring / Severe (unintelligible or mute from dysarthria).',opts:[{v:0,th:'ปกติ',en:'Normal'},{v:1,th:'ไม่ชัดเล็กน้อย',en:'Mild-moderate'},{v:2,th:'ไม่ชัดมาก',en:'Severe'}]},
  {id:'11',th:'11. Extinction / Inattention',en:'11. Extinction and Inattention',descTh:'ตรวจ double simultaneous stimulation (สัมผัสหรือเห็นทั้งสองด้านพร้อมกัน) — ปกติ / ไม่ใส่ใจหรือ extinction หนึ่งด้าน / ไม่ใส่ใจรุนแรง (hemi-inattention หรือ neglect ชัด)',descEn:'Double simultaneous stimulation. Normal / Inattention or extinction in one modality / Profound hemi-inattention or neglect.',opts:[{v:0,th:'ปกติ',en:'Normal'},{v:1,th:'ไม่ใส่ใจ 1 ด้าน',en:'One modality'},{v:2,th:'Profound',en:'Profound'}]},
];
const ABS=[
  {id:'sbp',t:'SBP >185 หรือ DBP >110 mmHg'},
  {id:'ect',t:'CT early ischemic change >1/3 hemisphere'},
  {id:'sah',t:'อาการสงสัย SAH'},
  {id:'ich',t:'ประวัติ intracranial hemorrhage'},
  {id:'tum',t:'Intracranial tumor / aneurysm / AVM'},
  {id:'s3m',t:'Prior stroke หรือ head trauma ใน 3 เดือน'},
  {id:'bl',t:'Active bleeding'},
  {id:'ar7',t:'Arterial puncture กดไม่ได้ ใน 7 วัน'},
  {id:'gl',t:'Blood sugar <50 mg/dl'},
  {id:'hep',t:'Heparin ใน 48 ชม. + PTT สูง'},
  {id:'ac',t:'Anticoagulant INR >1.7 หรือ PT >15 วิ'},

const ASPECT_LINK_KEY='aspect_links';
const ASPECT_DEFAULTS=[
  {label:'MDCalc ASPECT',url:'https://www.mdcalc.com/calc/3164/alberta-stroke-program-early-ct-score-aspects'},
  {label:'RadAtHand Calculator',url:'https://radathand.com/radiology-calculators/neuroradiology/aspects-score-calculator/'},
];
function getAspectLinks(){

async function loadAspectLinksFromTurso(){
  try{
    const r=await fetch('/turso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql:"SELECT value FROM settings WHERE key='aspect_links' LIMIT 1",args:[]})});
    const d=await r.json();

    if(rows.length&&rows[0]?.[0]?.value){ localStorage.setItem(ASPECT_LINK_KEY,rows[0][0].value); }

// ── HELPERS ──
function totNIHSS(){return NIHSS.reduce((s,i)=>s+(D.nihss[i.id]??0),0);}
function guestSuspectLVO(){
  const n=totNIHSS();
  const gaze=(D.nihss['2']??0)>0;
  const motor=[(D.nihss['5a']??0),(D.nihss['5b']??0),(D.nihss['6a']??0),(D.nihss['6b']??0)].some(v=>v>=2);
  const aphasia=(D.nihss['9']??0)>=2;
  const neglect=(D.nihss['11']??0)>=1;
  const hemi=(motor&&(D.lvoSigns?.lvo_hemi))||(D.lvoSigns?.lvo_hemi);
  const lvoN=(n>=6?1:0)+(gaze||D.lvoSigns?.lvo_gaze?1:0)+(hemi?1:0)+(aphasia||D.lvoSigns?.lvo_aphasia?1:0)+(neglect||D.lvoSigns?.lvo_neglect?1:0);
  return lvoN>=2;
}
function getSev(n){
  if(n<=0)return{l:'ปกติ',bg:'var(--sbg)',co:'var(--stx)',bd:'var(--sbd)',hx:'#EAF3DE',hco:'#27500A'};
  if(n<=4)return{l:'เล็กน้อย',bg:'var(--sbg)',co:'var(--stx)',bd:'var(--sbd)',hx:'#EAF3DE',hco:'#27500A'};
  if(n<=15)return{l:'ปานกลาง',bg:'var(--wbg)',co:'var(--wtx)',bd:'var(--wbd)',hx:'#FAEEDA',hco:'#633806'};
  if(n<=20)return{l:'ปานกลาง-รุนแรง',bg:'var(--dbg)',co:'var(--dtx)',bd:'var(--dbd)',hx:'#FCEBEB',hco:'#791F1F'};
  return{l:'รุนแรง',bg:'var(--dbg)',co:'var(--dtx)',bd:'var(--dbd)',hx:'#FCEBEB',hco:'#791F1F'};
}
function hasAbs(){return Object.values(D.absX).some(Boolean);}
function allIncl(){return D.incl.ais&&D.incl.o45&&D.incl.a18;}
function elig(){return allIncl()&&!hasAbs();}

// ── TABS ──
function switchTab(tab, btn){
  currentTab=tab;

}

// ── CRITERIA ──

  </div>`;}

  <div class="card">

window.updDec=function(){

window.setNihss=function(id,v){

  <div class="ck-row ${(D.lvoSigns?.lvo_gaze)||gaze?'ok':''}"><label><span class="ckbox ${(D.lvoSigns?.lvo_gaze)||gaze?'on':''}">${(D.lvoSigns?.lvo_gaze)||gaze?'✓':''}</span><span class="ck-text">Gaze deviation</span><input type="checkbox" ${(D.lvoSigns?.lvo_gaze)||gaze?'checked':''} onchange="D.lvoSigns=D.lvoSigns||{};D.lvoSigns.lvo_gaze=this.checked;render()"></label></div>
  <div class="ck-row ${hemi?'ok':''}"><label><span class="ckbox ${hemi?'on':''}">${hemi?'✓':''}</span><span class="ck-text">Hemiplegia ครึ่งซีก</span><input type="checkbox" ${hemi?'checked':''} onchange="D.lvoSigns=D.lvoSigns||{};D.lvoSigns.lvo_hemi=this.checked;render()"></label></div>
  <div class="ck-row ${aphasia?'ok':''}"><label><span class="ckbox ${aphasia?'on':''}">${aphasia?'✓':''}</span><span class="ck-text">Aphasia รุนแรง</span><input type="checkbox" ${aphasia?'checked':''} onchange="D.lvoSigns=D.lvoSigns||{};D.lvoSigns.lvo_aphasia=this.checked;render()"></label></div>
  <div class="ck-row ${neglect?'ok':''}"><label><span class="ckbox ${neglect?'on':''}">${neglect?'✓':''}</span><span class="ck-text">Hemispatial neglect</span><input type="checkbox" ${neglect?'checked':''} onchange="D.lvoSigns=D.lvoSigns||{};D.lvoSigns.lvo_neglect=this.checked;render()"></label></div>
  <div style="margin-top:10px;padding:8px 10px;background:var(--cbg);border-radius:8px;font-size:13px"><strong>สรุป:</strong> ${lvoText}</div>
  <div class="sec" style="margin-top:12px">เกณฑ์ Refer Thrombectomy</div>
  <div style="font-size:12px;color:var(--tx2);line-height:1.5">
    <p style="margin:4px 0">• Onset 0–4.5 ชม. + ได้ rt-PA + สงสัย LVO → พิจารณา Refer</p>
    <p style="margin:4px 0">• Onset 4.5–24 ชม. + NIHSS ≥6 + ASPECT ≥6 + สงสัย LVO → พิจารณา Refer</p>
  </div>
  <div class="sec" style="margin-top:16px">Thrombectomy checklist (รพ.สงฆ์)</div>
  <div class="sec-sub">Inclusion criteria (เกณฑ์เข้า)</div>
  ${[
    {k:'mrs01',l:'prestroke mRS 0–1'},
    {k:'rtpa45',l:'ได้รับ IV rt-PA ภายใน 4.5 ชม. หลัง onset'},
    {k:'icam1',l:'ICA หรือ MCA (M1) occlusion/ severe stenosis'},
    {k:'age18',l:'อายุ >18 ปี'},
    {k:'nihss6',l:'NIHSS ≥6'},
    {k:'aspect6',l:'ASPECTS ≥6'},
    {k:'groin6',l:'ทำ groin puncture ได้ภายใน 6 ชม. หลัง onset'},
    {k:'noContra',l:'ไม่มีข้อห้าม IV rt-PA (หรือมีแต่ยังพิจารณา thrombectomy ได้)'},
  ].map(x=>{ const v=!!(x.k==='nihss6'?nihss6:x.k==='aspect6'?aspectOk:D.thromboIncl?.[x.k]); const dis=x.k==='nihss6'||x.k==='aspect6'; return `<div class="ck-row ${v?'ok':''}"><label><span class="ckbox ${v?'ok':''}">${v?'✓':''}</span><span class="ck-text">${x.l}</span><input type="checkbox" ${v?'checked':''} onchange="D.thromboIncl=D.thromboIncl||{};D.thromboIncl['${x.k}']=this.checked;render()" ${dis?'disabled':''}></label>${x.k==='nihss6'?`<span class="ck-badge">NIHSS=${n}</span>`:x.k==='aspect6'?`<span class="ck-badge">ASPECT=${aspect!==undefined?aspect:'–'}</span>`:''}</div>`; }).join('')}
  <div class="sec-sub" style="margin-top:10px">Relative exclusion criteria (เกณฑ์ออกเชิงเปรียบเทียบ)</div>
  ${[
    {k:'m2etc',l:'MCA (M2,M3), ACA, VA, PCA, BA occlusion'},
    {k:'mrs2',l:'mRS &lt;2'},
    {k:'nihss6ex',l:'NIHSS &lt;6'},
    {k:'age18ex',l:'อายุ &lt;18 ปี'},
    {k:'groin24',l:'ทำ groin puncture ได้ภายใน 24 ชม. หลัง onset'},
  ].map(x=>{ const v=!!(x.k==='nihss6ex'?n<6:D.thromboExcl?.[x.k]); const dis=x.k==='nihss6ex'; return `<div class="ck-row ${v?'bad':''}"><label><span class="ckbox ${v?'bad':''}">${v?'✓':''}</span><span class="ck-text">${x.l}</span><input type="checkbox" ${v?'checked':''} onchange="D.thromboExcl=D.thromboExcl||{};D.thromboExcl['${x.k}']=this.checked;render()" ${dis?'disabled':''}></label>${x.k==='nihss6ex'?`<span class="ck-badge">NIHSS=${n}</span>`:''}</div>`; }).join('')}
  <div class="thrombo-notes">
    <div class="sec-sub" style="margin-top:12px">หมายเหตุ 1</div>
    <p style="font-size:12px;color:var(--tx2);line-height:1.5;margin:4px 0">นอกเหนือจากเกณฑ์ 8 ข้อแล้ว ยังสามารถทำ endovascular therapy ได้ โดยพิจารณาเป็นรายกรณี เช่น หลอดเลือด ACA, VA, BA, PCA หรือระยะเวลาหลัง onset มากกว่า 6 ชม.</p>
    <div class="sec-sub" style="margin-top:10px">หมายเหตุ 2 — วิธีคำนวณ ASPECT</div>
    <p style="font-size:12px;color:var(--tx2);line-height:1.5;margin:4px 0">แบ่งเป็น anterior และ posterior circulation คะแนนเต็ม 10 หัก 1 คะแนนต่อตำแหน่งที่พบ hypodensity หรือ swelling บน CT Brain</p>
  </div>
</div>`;
}

// ── rt-PA ──
function rRtPA(){
  const bw=parseFloat(D.weight)||0;
  const td=bw?Math.min(bw*0.9,90):0;
  return `<div class="card">
  <div class="sec">คำนวณขนาดยา rt-PA (Alteplase 0.9 mg/kg)</div>
  <div style="margin-bottom:12px"><div class="lbl">น้ำหนักผู้ป่วย (kg)</div>
  <input type="number" value="${D.weight}" oninput="D.weight=this.value;updDose()" placeholder="เช่น 65" style="font-size:20px;font-weight:500"></div>
  <div id="doseResult">
  ${bw>0?`<div class="dose-grid">
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Total dose</div><div style="font-size:22px;font-weight:700">${td.toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg${bw>100?' (max 90)':''}</div></div>
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Bolus 10%</div><div style="font-size:22px;font-weight:700">${(td*.1).toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg IV push 1 นาที</div></div>
    <div class="dose-card" style="background:var(--ibg)"><div style="font-size:10px;color:var(--itx);margin-bottom:4px">Infusion 90%</div><div style="font-size:22px;font-weight:700;color:var(--itx)">${(td*.9).toFixed(1)}</div><div style="font-size:11px;color:var(--itx)">mg drip 60 นาที</div></div>
  </div>
  <div style="margin-top:8px;padding:10px 14px;background:var(--ibg);border-radius:var(--rm);font-size:12px;color:var(--itx)">
    <strong>Infusion pump / Syringe pump เท่านั้น</strong> — ไม่ผสมกับยาอื่น
  </div>`:`<div style="padding:20px;text-align:center;color:var(--tx2);background:var(--bg2);border-radius:var(--rm);font-size:13px">ป้อนน้ำหนักผู้ป่วยเพื่อคำนวณขนาดยา</div>`}
  </div></div>
  <div class="card"><div class="sec">ข้อควรระวัง</div>
  ${['ใช้ SWFI ละลายยา 1 mg/ml — ห้ามเจือจางด้วย Dextrose','ห้ามเขย่าขวด — หมุนหรือเอียงขวดช้าๆ','ห้ามผสมกับยาอื่นในขวดหรือสาย IV เดียวกัน','ความคงตัว: 24 ชม. ในตู้เย็น / 8 ชม. ที่ ≤25°C'].map(t=>`<div class="warn-row"><span style="color:var(--wtx)">⚠</span><span>${t}</span></div>`).join('')}
  </div>
  <div class="card"><div class="sec">รายงานแพทย์เมื่อ</div>
  ${['SBP >185 หรือ <110 mmHg','DBP >110 หรือ <60 mmHg','Pulse <50 bpm','Neurological sign เปลี่ยนแปลง (แย่ลง)','Internal bleeding: ปวดท้อง อาเจียนเลือด ถ่ายดำ ปัสสาวะมีเลือดปน'].map(t=>`<div class="warn-row"><span style="color:var(--dtx);font-weight:600">!</span><span>${t}</span></div>`).join('')}
  </div>
  <div class="card"><div class="sec">ถ้าสงสัย Intracranial Hemorrhage</div>
  ${['หยุดยา rt-PA ทันที','ส่ง CT brain NC ฉุกเฉิน','Repeat CBC, PT, PTT, INR','Cross matching FFP 6–8 units (หรือ 10 ml/kg)'].map((t,i)=>`<div class="warn-row"><div class="step-num">${i+1}</div><span>${t}</span></div>`).join('')}
  </div>
  <div class="card"><div class="sec">ห้ามใน 24 ชม. หลัง rt-PA</div>
  ${['Foley catheter','NG tube','Arterial puncture','IM injection','Antiplatelet / anticoagulant / antithrombotic'].map(t=>`<div class="warn-row"><span style="color:var(--dtx);font-weight:600">✗</span><span>${t}</span></div>`).join('')}
  </div>`;
}
window.updDose=function(){
  const bw=parseFloat(D.weight)||0;const td=bw?Math.min(bw*0.9,90):0;
  const el=document.getElementById('doseResult');
  if(!el)return;
  el.innerHTML=bw>0?`<div class="dose-grid">
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Total dose</div><div style="font-size:22px;font-weight:700">${td.toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg${bw>100?' (max 90)':''}</div></div>
    <div class="dose-card"><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">Bolus 10%</div><div style="font-size:22px;font-weight:700">${(td*.1).toFixed(1)}</div><div style="font-size:11px;color:var(--tx2)">mg IV push 1 นาที</div></div>
    <div class="dose-card" style="background:var(--ibg)"><div style="font-size:10px;color:var(--itx);margin-bottom:4px">Infusion 90%</div><div style="font-size:22px;font-weight:700;color:var(--itx)">${(td*.9).toFixed(1)}</div><div style="font-size:11px;color:var(--itx)">mg drip 60 นาที</div></div>
  </div>
  <div style="margin-top:8px;padding:10px 14px;background:var(--ibg);border-radius:var(--rm);font-size:12px;color:var(--itx)"><strong>Infusion pump / Syringe pump เท่านั้น</strong> — ไม่ผสมกับยาอื่น</div>`:
  `<div style="padding:20px;text-align:center;color:var(--tx2);background:var(--bg2);border-radius:var(--rm);font-size:13px">ป้อนน้ำหนักผู้ป่วยเพื่อคำนวณขนาดยา</div>`;
};

// ── TOGGLE (generic) ──
window.toggle=function(group,key){
  if(group==='befast')D.befast[key]=!D.befast[key];
  else if(group==='symp')D.symp[key]=!D.symp[key];
  else if(group==='incl')D.incl[key]=!D.incl[key];
  else if(group==='absX')D.absX[key]=!D.absX[key];
  else if(group==='relX')D.relX[key]=!D.relX[key];
  else if(group==='excl45')D.excl45[key]=!D.excl45[key];
  else if(group==='rel45')D.rel45[key]=!D.rel45[key];
  render();
};

// ── CLOCK ──
function tick(){
  const d=new Date();
  const el=document.getElementById('clockEl');
  if(el)el.textContent=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000);tick();

// ── INIT ──
render();
</script>
</body>
</html>
