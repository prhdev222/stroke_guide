<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Fast Tract — Staff Wizard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeece8;--tx:#1a1a18;--tx2:#6b6b67;
  --bl:#e5e3dc;--bm:#c8c6be;--rm:8px;--rl:12px;
  --sbg:#EAF3DE;--stx:#27500A;--sbd:#97C459;
  --wbg:#FAEEDA;--wtx:#633806;--wbd:#EF9F27;
  --dbg:#FCEBEB;--dtx:#791F1F;--dbd:#F09595;
  --ibg:#E6F1FB;--itx:#185FA5;--ibd:#85B7EB;
  --red:#C41E3A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#111110;
  --tx:#f0ede6;--tx2:#9a9893;--bl:#2e2e2b;--bm:#3a3a36;
  --sbg:#173404;--stx:#C0DD97;--sbd:#3B6D11;
  --wbg:#412402;--wtx:#FAC775;--wbd:#854F0B;
  --dbg:#501313;--dtx:#F7C1C1;--dbd:#A32D2D;
  --ibg:#042C53;--itx:#B5D4F4;--ibd:#185FA5;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:var(--bg3);color:var(--tx);font-size:14px;min-height:100vh}
input,select,textarea{font-family:inherit;font-size:14px;padding:8px 10px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg);color:var(--tx);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.2)}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;cursor:pointer}

/* PIN */
#lockWrap{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.pin-card{background:var(--bg);border:0.5px solid var(--bl);border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--bm);transition:all .15s}
.pin-dot.f{background:var(--red);border-color:#8B1225}
.pin-dot.e{background:#FAECE7;border-color:#F0997B;animation:sh .3s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.pin-btn{padding:15px;border:0.5px solid var(--bm);border-radius:12px;background:var(--bg2);font-size:20px;font-weight:500;color:var(--tx);transition:all .1s}
.pin-btn:active{background:var(--bl);transform:scale(.95)}
.pin-err{font-size:12px;color:var(--dtx);min-height:18px;margin-top:4px}

/* APP */
#app{display:none}
.top-bar{background:var(--bg);border-bottom:0.5px solid var(--bl);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.step-progress{display:flex;gap:0;margin:0 12px;flex:1}
.step-pip{flex:1;height:4px;background:var(--bl);border-radius:2px;transition:background .3s;margin:0 1px}
.step-pip.done{background:var(--red);cursor:pointer}
.step-pip.done:hover{opacity:.7;transform:scaleY(1.5)}
.step-pip.active{background:var(--red);opacity:.5}

/* CONTENT */
.wizard-wrap{padding:14px;max-width:680px;margin:0 auto;padding-bottom:100px}
.card{background:var(--bg);border:0.5px solid var(--bl);border-radius:var(--rl);padding:16px;margin-bottom:10px}
.step-title{font-size:18px;font-weight:700;margin-bottom:4px}
.step-sub{font-size:13px;color:var(--tx2);margin-bottom:16px}
.sec{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.sec-sub{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.time-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;margin-bottom:10px}
.now-btn{padding:8px 11px;font-size:12px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--tx2);white-space:nowrap;cursor:pointer}
input.datetime-input{min-width:180px}
input[type=datetime-local]{cursor:pointer}

/* SYMPTOM CHIPS */
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sym-chip{padding:10px 12px;border-radius:var(--rm);border:0.5px solid var(--bl);background:var(--bg2);cursor:pointer;user-select:none;font-size:13px;display:flex;align-items:center;gap:8px;transition:all .1s}
.sym-chip.on{background:var(--sbg);border-color:var(--sbd);color:var(--stx)}
.sym-chip-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--bm);flex-shrink:0;transition:all .1s}
.sym-chip.on .sym-chip-dot{background:#639922;border-color:#3B6D11}

/* CT OPTION */
.ct-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.ct-opt{padding:14px;border-radius:var(--rl);border:1.5px solid var(--bl);background:var(--bg2);cursor:pointer;user-select:none;text-align:center;transition:all .15s}
.ct-opt.sel-ich{background:var(--dbg);border-color:var(--dbd)}
.ct-opt.sel-ais{background:var(--ibg);border-color:var(--ibd)}
.ct-opt.sel-neg{background:var(--sbg);border-color:var(--sbd)}
.ct-opt.sel-pend{background:var(--wbg);border-color:var(--wbd)}
.ct-icon{font-size:26px;margin-bottom:6px}
.ct-label{font-size:13px;font-weight:600}
.ct-sub{font-size:11px;color:var(--tx2);margin-top:2px}

/* NIHSS */
.nihss-item{position:relative}
.nihss-desc{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--rm);border:0.5px solid var(--bl)}
.nihss-desc-lang{display:inline-block;margin-right:8px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;margin-bottom:4px}
.nihss-desc-lang.active{background:var(--ibg);color:var(--itx);border:0.5px solid var(--ibd)}
.nihss-desc-lang:not(.active){background:var(--bg3);color:var(--tx2);border:0.5px solid var(--bm)}
.nihss-desc-en{display:none}
.nihss-lang-en .nihss-desc-th{display:none}
.nihss-lang-en .nihss-desc-en{display:block}
.nihss-item{margin-bottom:10px;padding:12px;background:var(--bg2);border-radius:var(--rm);border:0.5px solid var(--bl)}
.nihss-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.nihss-btn{padding:5px 11px;border-radius:6px;border:0.5px solid var(--bm);background:var(--bg);font-size:13px;color:var(--tx);cursor:pointer;transition:all .1s}
.nihss-btn.s0{background:var(--sbg);border-color:var(--sbd);color:var(--stx);font-weight:600}
.nihss-btn.sw{background:var(--wbg);border-color:var(--wbd);color:var(--wtx);font-weight:600}
.nihss-btn.sd{background:var(--dbg);border-color:var(--dbd);color:var(--dtx);font-weight:600}

/* CHECKLIST */
.ck-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--rm);margin-bottom:6px;cursor:pointer;user-select:none;border:0.5px solid var(--bl);background:var(--bg2)}
.ck-row.ck-ok{background:var(--sbg);border-color:var(--sbd)}
.ck-row.ck-bad{background:var(--dbg);border-color:var(--dbd)}
.ck-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--bm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.ck-box.ok{background:#639922;border-color:#3B6D11;color:white}
.ck-box.bad{background:var(--red);border-color:#8B1225;color:white}

/* AI */
.ai-bubble{background:var(--bg2);border-radius:var(--rl);padding:16px;border:0.5px solid var(--bl);white-space:pre-wrap;line-height:1.8;font-size:13px;min-height:120px}
.ai-typing{display:flex;gap:5px;align-items:center;padding:16px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--bm);animation:bounce 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* RESULT CARDS */
.result-big{padding:16px;border-radius:var(--rl);text-align:center;margin-bottom:10px;border-width:2px;border-style:solid}
.result-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin:4px 3px}
.action-item{display:flex;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--rm);margin-bottom:6px;align-items:flex-start}
.action-num{width:22px;height:22px;border-radius:50%;background:var(--red);color:white;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--bl);padding:12px 16px;display:flex;gap:10px;z-index:99}
.btn-back{flex:1;padding:13px;border:0.5px solid var(--bm);border-radius:var(--rl);background:var(--bg2);color:var(--tx);font-size:14px;font-family:inherit}
.btn-next{flex:2;padding:13px;border:none;border-radius:var(--rl);background:var(--red);color:white;font-size:14px;font-weight:700;font-family:inherit}
.btn-next:disabled{opacity:.4;cursor:not-allowed}

/* ATTACH */
.attach-zone{border:1.5px dashed var(--bm);border-radius:var(--rl);padding:18px;text-align:center;cursor:pointer;background:var(--bg2)}
.attach-zone:hover{border-color:#378ADD}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:8px}
.thumb{position:relative;aspect-ratio:1;border-radius:var(--rm);overflow:hidden;border:0.5px solid var(--bl)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-rm{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.6);color:white;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:var(--rm);margin-bottom:6px}

/* ONSET CALC */
.onset-box{padding:12px 16px;border-radius:var(--rl);text-align:center;margin-top:10px;border:1px solid}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="lockWrap">
  <div class="pin-card">
    <div style="font-size:40px;margin-bottom:12px">🏥</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:2px">Stroke Fast Tract</div>
    <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">Staff Mode — โรงพยาบาลสงฆ์</div>
    <div id="pinSourceBadge" style="font-size:10px;padding:3px 10px;border-radius:10px;margin-bottom:14px;display:inline-block">💾 PIN จากเครื่องนี้ (local)</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pk('1')">1</button><button class="pin-btn" onclick="pk('2')">2</button><button class="pin-btn" onclick="pk('3')">3</button>
      <button class="pin-btn" onclick="pk('4')">4</button><button class="pin-btn" onclick="pk('5')">5</button><button class="pin-btn" onclick="pk('6')">6</button>
      <button class="pin-btn" onclick="pk('7')">7</button><button class="pin-btn" onclick="pk('8')">8</button><button class="pin-btn" onclick="pk('9')">9</button>
      <button class="pin-btn" onclick="pk('0')" style="grid-column:2">0</button>
      <button class="pin-btn" onclick="pdel()" style="font-size:16px;color:var(--tx2)">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <button id="changePinBtn" onclick="showSetup()" style="padding:8px 20px;border:0.5px solid var(--bm);border-radius:var(--rm);background:transparent;color:var(--tx2);font-size:12px;margin-top:10px;font-family:inherit">เปลี่ยน PIN</button>
    <div style="margin-top:10px;padding:10px;background:var(--bg2);border-radius:var(--rm);font-size:11px;color:var(--tx2);line-height:1.6">🔒 ข้อมูลผู้ป่วยจะถูกเคลียร์ทุกครั้งที่ล็อก — ปฏิบัติตาม พ.ร.บ. PDPA</div>
  </div>
</div>

<!-- SETUP PIN (hidden overlay) -->
<div id="setupWrap" style="display:none;position:fixed;inset:0;background:var(--bg3);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px">
  <div class="pin-card">
    <div style="font-size:17px;font-weight:700;margin-bottom:4px" id="setupTitle">ตั้งรหัส PIN ใหม่</div>
    <div style="font-size:12px;color:var(--tx2);margin-bottom:20px" id="setupSub">ป้อน PIN 4 หลัก</div>
    <div class="pin-dots" id="setupDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="sk('1')">1</button><button class="pin-btn" onclick="sk('2')">2</button><button class="pin-btn" onclick="sk('3')">3</button>
      <button class="pin-btn" onclick="sk('4')">4</button><button class="pin-btn" onclick="sk('5')">5</button><button class="pin-btn" onclick="sk('6')">6</button>
      <button class="pin-btn" onclick="sk('7')">7</button><button class="pin-btn" onclick="sk('8')">8</button><button class="pin-btn" onclick="sk('9')">9</button>
      <button class="pin-btn" onclick="sk('0')" style="grid-column:2">0</button>
      <button class="pin-btn" onclick="sdel()" style="font-size:16px;color:var(--tx2)">⌫</button>
    </div>
    <div class="pin-err" id="setupErr"></div>
    <button onclick="closeSetup()" style="padding:8px 20px;border:0.5px solid var(--bm);border-radius:var(--rm);background:transparent;color:var(--tx2);font-size:12px;margin-top:10px;font-family:inherit">ยกเลิก</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="top-bar">
    <div>
      <div style="font-size:13px;font-weight:700">Stroke Fast Tract</div>
      <div id="stepLabel" style="font-size:11px;color:var(--tx2)">ขั้น 1/7</div>
    </div>
    <div class="step-progress" id="stepProgress"></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="clockEl" style="font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;text-align:right"></div>
      <button onclick="showTursoSettings()" style="padding:5px 9px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--tx2);font-size:12px;font-family:inherit" title="Turso Case Log">📦</button>
      <button onclick="confirmExit()" style="padding:5px 9px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--tx2);font-size:12px;font-family:inherit">🔒</button>
    </div>
  </div>
  <div class="wizard-wrap" id="wizardContent"></div>
  <div class="bottom-nav">
    <button class="btn-back" id="btnBack" onclick="goBack()" style="display:none;align-items:center;justify-content:center;gap:6px">← <span id="backLabel">ย้อนกลับ</span></button>
    <button class="btn-next" id="btnNext" onclick="goNext()">ถัดไป →</button>
  </div>
</div>

<!-- OFFSCREEN PDF SUMMARY -->
<div id="pdfSummary" style="position:fixed;left:-9999px;top:0;width:794px;background:white;color:#111;font-family:sans-serif;padding:48px 56px;font-size:13px;line-height:1.7;z-index:-1"></div>
<div class="prog-overlay" id="pdfProgress" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:white;gap:14px">
  <div style="font-size:15px;font-weight:500" id="pdfMsg">กำลังสร้าง PDF...</div>
  <div style="width:280px;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden"><div id="pdfBar" style="height:100%;background:white;border-radius:4px;transition:width .3s;width:0%"></div></div>
</div>

<script>
// ==================== PIN ====================
let pinBuf='',setupBuf='',setupStep='first',setupFirst='';
let pinChecking=false;

// PIN source: 'turso' | 'local'
let pinSource='local';

function updDots(id,len,err=false){
  const d=document.getElementById(id).children;
  for(let i=0;i<4;i++)d[i].className='pin-dot'+(i<len?(err?' e':' f'):'');
}

// Turso: fetch PIN from settings table
async function getPinRemote(){
  try{
    const r=await tursoExec("SELECT value FROM settings WHERE key='staff_pin' LIMIT 1");
    if(r.error||!r.rows||r.rows.length===0)return null;
    return r.rows[0].value||null;
  }catch{return null;}
}

// Turso: save PIN to settings table
async function savePinRemote(pin){
  await ensureSettingsTable();
  const r=await tursoExec(
    "INSERT INTO settings(key,value) VALUES('staff_pin',?) ON CONFLICT(key) DO UPDATE SET value=excluded.value",
    [pin]
  );
  return!r.error;
}

// localStorage fallback
function savePinLocal(p){localStorage.setItem('sp',p);}
function getPinLocal(){return localStorage.getItem('sp')||'2569';}

// Update lock screen PIN source badge
function updatePinSourceBadge(src){
  const el=document.getElementById('pinSourceBadge');
  if(!el)return;
  if(src==='turso'){
    el.textContent='🔐 PIN จาก Turso — Admin เป็นผู้ตั้งรหัส';
    el.style.color='var(--stx)';
    el.style.background='var(--sbg)';
  } else {
    el.textContent='💾 PIN จากเครื่องนี้ (local)';
    el.style.color='var(--wtx)';
    el.style.background='var(--wbg)';
  }
  // ซ่อนปุ่ม "เปลี่ยน PIN" ถ้า Turso configured (ให้ admin เปลี่ยนผ่าน menu แทน)
  const chBtn=document.getElementById('changePinBtn');
  if(chBtn)chBtn.style.display=src==='turso'?'none':'inline-block';
}

function pk(k){
  if(pinBuf.length>=4||pinChecking)return;
  pinBuf+=k;
  updDots('pinDots',pinBuf.length);
  if(pinBuf.length===4)setTimeout(checkPin,150);
}
function pdel(){
  if(pinChecking)return;
  if(pinBuf.length){pinBuf=pinBuf.slice(0,-1);updDots('pinDots',pinBuf.length);document.getElementById('pinErr').textContent='';}
}

async function checkPin(){
  pinChecking=true;
  const errEl=document.getElementById('pinErr');
  errEl.textContent='กำลังตรวจสอบ...';
  errEl.style.color='var(--tx2)';

  // ลองดึง PIN จาก Turso ก่อน
  let correctPin=await getPinRemote();
  if(correctPin){
    pinSource='turso';
  } else {
    // Fallback: ใช้ PIN จาก localStorage
    correctPin=getPinLocal();
    pinSource='local';
  }
  updatePinSourceBadge(pinSource);

  if(pinBuf===correctPin){
    pinBuf='';updDots('pinDots',0);
    errEl.textContent='';
    document.getElementById('lockWrap').style.display='none';
    document.getElementById('app').style.display='block';
    startApp();
  } else {
    updDots('pinDots',4,true);
    errEl.textContent='รหัสไม่ถูกต้อง';
    errEl.style.color='var(--dtx)';
    setTimeout(()=>{pinBuf='';updDots('pinDots',0);},800);
  }
  pinChecking=false;
}

function showSetup(){
  // ถ้า Turso configured → แจ้งว่าต้องเปลี่ยนผ่าน admin (menu.html)
  const cfg={url:true,token:true};if(cfg.url&&cfg.token){
    alert('PIN ถูกจัดการโดย Admin ผ่าน Turso\nกรุณาเปลี่ยน PIN ที่ menu.html → ⚙️ ตั้งค่า → เปลี่ยน PIN (Admin)');
    return;
  }
  document.getElementById('setupWrap').style.display='flex';
  setupBuf='';setupStep='first';setupFirst='';
  document.getElementById('setupTitle').textContent='ตั้งรหัส PIN ใหม่';
  document.getElementById('setupSub').textContent='ป้อน PIN 4 หลัก';
  updDots('setupDots',0);
}
function closeSetup(){document.getElementById('setupWrap').style.display='none';}
function sk(k){if(setupBuf.length>=4)return;setupBuf+=k;updDots('setupDots',setupBuf.length);if(setupBuf.length===4)setTimeout(handleSetup,150);}
function sdel(){if(setupBuf.length){setupBuf=setupBuf.slice(0,-1);updDots('setupDots',setupBuf.length);}}
async function handleSetup(){
  if(setupStep==='first'){
    setupFirst=setupBuf;setupBuf='';setupStep='confirm';
    document.getElementById('setupTitle').textContent='ยืนยัน PIN';
    document.getElementById('setupSub').textContent='ป้อน PIN อีกครั้ง';
    updDots('setupDots',0);
  } else {
    if(setupBuf===setupFirst){
      // บันทึก PIN ทั้ง Turso และ localStorage
      savePinLocal(setupBuf);
      const savedRemote=await savePinRemote(setupBuf);
      closeSetup();
      const msg=savedRemote?'บันทึก PIN ไปยัง Turso สำเร็จ (ทุก device อัปเดตอัตโนมัติ)':'บันทึก PIN ในเครื่องนี้เท่านั้น (Turso ยังไม่ได้ตั้งค่า)';
      document.getElementById('pinErr').textContent=msg;
      document.getElementById('pinErr').style.color=savedRemote?'var(--stx)':'var(--wtx)';
    } else {
      updDots('setupDots',4,true);
      document.getElementById('setupErr').textContent='ไม่ตรงกัน';
      setTimeout(()=>{setupBuf='';setupStep='first';setupFirst='';document.getElementById('setupTitle').textContent='ตั้งรหัส PIN ใหม่';document.getElementById('setupSub').textContent='ป้อน PIN 4 หลัก';document.getElementById('setupErr').textContent='';updDots('setupDots',0);},900);
    }
  }
}

// ==================== HELPERS ====================
function getNow(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function getNowDatetime(){const d=new Date();const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'),h=String(d.getHours()).padStart(2,'0'),min=String(d.getMinutes()).padStart(2,'0');return `${y}-${m}-${day}T${h}:${min}`;}
function parseForDate(s){if(!s)return null;if(s.indexOf('T')>=0){const d=new Date(s);return isNaN(d.getTime())?null:d;}const [h,m]=s.split(':').map(Number);if(isNaN(h)||isNaN(m))return null;const d=new Date();d.setHours(h,m,0,0);return d;}
function diffMin(a,b){const da=parseForDate(a),db=parseForDate(b);if(!da||!db)return null;return Math.round((db-da)/60000);}
function formatDisplayDatetime(s){if(!s)return '—';if(s.indexOf('T')>=0){const d=new Date(s);if(isNaN(d.getTime()))return s;return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}return s;}
function toDatetimeLocalValue(s){if(!s)return '';if(s.indexOf('T')>=0)return s.slice(0,16);const d=new Date();const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}T${s}`;}
function getNIHSS(){return NIHSS.reduce((s,i)=>s+(D.nihss[i.id]??0),0);}
function getSev(n){
  if(n<=0)return{label:'ปกติ (0)',bg:'var(--sbg)',co:'var(--stx)',bc:'var(--sbd)'};
  if(n<=4)return{label:'เล็กน้อย (1–4)',bg:'var(--sbg)',co:'var(--stx)',bc:'var(--sbd)'};
  if(n<=15)return{label:'ปานกลาง (5–15)',bg:'var(--wbg)',co:'var(--wtx)',bc:'var(--wbd)'};
  if(n<=20)return{label:'ปานกลาง-รุนแรง (16–20)',bg:'var(--dbg)',co:'var(--dtx)',bc:'var(--dbd)'};
  return{label:'รุนแรง (≥21)',bg:'var(--dbg)',co:'var(--dtx)',bc:'var(--dbd)'};
}
function hasAbs(){return Object.values(D.absExcl).some(v=>v);}
function allIncl(){return D.incl.ais&&D.incl.onset45&&D.incl.age18;}
function eligible(){return allIncl()&&!hasAbs();}
function getOnsetHours(){const d=diffMin(D.strokeOnset||D.lastSeen,D.erArrival);return d===null?null:d/60;}

// LVO suspicion heuristic
function suspectLVO(){
  const tot=getNIHSS();
  const gaze=(D.nihss['2']??0)>0;
  const motor=[(D.nihss['5a']??0),(D.nihss['5b']??0),(D.nihss['6a']??0),(D.nihss['6b']??0)].some(v=>v>=2);
  const aphasia=(D.nihss['9']??0)>=2;
  return tot>=6&&(gaze||motor||aphasia);
}

function readDU(f){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});}
function readAB(f){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsArrayBuffer(f);});}

// ==================== RENDER STEPS ====================
function renderProgress(){
  let h='';
  for(let i=0;i<STEPS.length;i++){
    const isDone=i<step, isActive=i===step;
    const clickable=isDone; // สามารถกดย้อนกลับได้
    h+=`<div
      class="step-pip${isDone?' done':isActive?' active':''}"
      ${clickable?`onclick="jumpToStep(${i})" title="กลับไป: ${STEPS[i].label}" style="cursor:pointer"`:''}
    ></div>`;
  }
  document.getElementById('stepProgress').innerHTML=h;
  document.getElementById('stepLabel').textContent=`ขั้น ${step+1}/${STEPS.length} — ${STEPS[step].label}`;
  document.getElementById('btnBack').style.display=step===0?'none':'flex';
  const backEl=document.getElementById('backLabel');if(backEl)backEl.textContent=step>0?STEPS[step-1].label:'ย้อนกลับ';
  document.getElementById('btnNext').textContent=step===7?'📋 สร้าง PDF ส่งต่อ':'ถัดไป →';
}

window.jumpToStep=function(target){
  if(target<step){ // ย้อนกลับเท่านั้น
    step=target;
    renderStep();
  }
};

function renderStep(){
  const fn=[rPatient,rTimeline,rSymptoms,rCT,rLab,rNIHSS,rChecklist,rPlan];
  document.getElementById('wizardContent').innerHTML=fn[step]();
  renderProgress();
  window.scrollTo(0,0);
}

function rTimeline(){
  const oh=getOnsetHours();
  let onsetBox='';
  if(oh!==null){
    const col=oh<=4.5?'var(--ibg)':oh<=24?'var(--wbg)':'var(--dbg)';
    const tcol=oh<=4.5?'var(--itx)':oh<=24?'var(--wtx)':'var(--dtx)';
    const brd=oh<=4.5?'var(--ibd)':oh<=24?'var(--wbd)':'var(--dbd)';
    const label=oh<=4.5?`Stroke Fast Tract — พิจารณา rt-PA หรือ refer`:oh<=24?'4.5–24 ชม. — พิจารณา Thrombectomy':'เกิน 24 ชม. — Conservative';
    onsetBox=`<div class="onset-box" style="background:${col};border-color:${brd};color:${tcol};margin-top:10px">
      <div style="font-size:28px;font-weight:700">${oh.toFixed(1)} ชั่วโมง</div>
      <div style="font-size:13px;font-weight:600;margin-top:4px">${label}</div>
    </div>`;
  }
  const dn=diffMin(D.erArrival,D.ivRtPA);
  let dnBox='';

window.reRenderOnset=function(){
  // lightweight re-render just onset box
  const oh=getOnsetHours();
  const dn=diffMin(D.erArrival,D.ivRtPA);
  let html='';
  if(oh!==null){
    const col=oh<=4.5?'var(--ibg)':oh<=24?'var(--wbg)':'var(--dbg)';
    const tcol=oh<=4.5?'var(--itx)':oh<=24?'var(--wtx)':'var(--dtx)';
    const brd=oh<=4.5?'var(--ibd)':oh<=24?'var(--wbd)':'var(--dbd)';
    const label=oh<=4.5?'Stroke Fast Tract — พิจารณา rt-PA หรือ refer':oh<=24?'4.5–24 ชม. — พิจารณา Thrombectomy':'เกิน 24 ชม. — Conservative';
    html+=`<div class="onset-box" style="background:${col};border-color:${brd};color:${tcol};margin-top:10px">
      <div style="font-size:24px;font-weight:700">${oh.toFixed(1)} ชั่วโมง</div>
      <div style="font-size:13px;font-weight:600;margin-top:4px">${label}</div>
    </div>`;
  }
  if(dn!==null){
    const ok=dn<=60;
    html+=`<div style="padding:8px 14px;border-radius:var(--rm);background:${ok?'var(--ibg)':'var(--dbg)'};border:0.5px solid ${ok?'var(--ibd)':'var(--dbd)'};font-size:12px;color:${ok?'var(--itx)':'var(--dtx)'};margin-top:8px;font-weight:500">DTN: ${dn} นาที ${ok?'✓ ≤60 นาที':'⚠ เกินเป้าหมาย'}</div>`;
  }
  const el=document.getElementById('onsetResult');
  if(el)el.innerHTML=html;
};

// ── ASPECT Links (from Turso settings or localStorage fallback) ──────────
const ASPECT_LINK_KEY = 'aspect_links';
const ASPECT_DEFAULTS = [
  {label:'MDCalc ASPECT', url:'https://www.mdcalc.com/calc/3164/alberta-stroke-program-early-ct-score-aspects'},
  {label:'RadAtHand Calculator', url:'https://radathand.com/radiology-calculators/neuroradiology/aspects-score-calculator/'},
];

function getAspectLinks(){
  try{
    const stored=localStorage.getItem(ASPECT_LINK_KEY);
    return stored?JSON.parse(stored):ASPECT_DEFAULTS;
  }catch{return ASPECT_DEFAULTS;}
}

async function loadAspectLinksFromTurso(){
  try{
    const r=await fetch('/turso',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sql:"SELECT value FROM settings WHERE key='aspect_links' LIMIT 1",args:[]})});
    const d=await r.json();
    const rows=d.results?.[0]?.response?.result?.rows||[];
    if(rows.length&&rows[0][0]?.value){
      localStorage.setItem(ASPECT_LINK_KEY,rows[0][0].value);
    }
  }catch{}
}

async function saveAspectLinksToTurso(links){
  const val=JSON.stringify(links);
  localStorage.setItem(ASPECT_LINK_KEY,val);
  try{
    await fetch('/turso',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        sql:"INSERT INTO settings(key,value) VALUES('aspect_links',?) ON CONFLICT(key) DO UPDATE SET value=excluded.value",
        args:[val]
      })});
  }catch{}
}

// Load from Turso on startup (non-blocking)
loadAspectLinksFromTurso();

// ---- STEP 6: CHECKLIST ----
function ckRow(checked,label,onclick,danger=false){
  return `<div class="ck-row${checked?(danger?' ck-bad':' ck-ok'):''}" onclick="${onclick}">
    <div class="ck-box${checked?(danger?' bad':' ok'):''}${!checked?'':''}">${checked?'✓':''}</div>
    <div style="flex:1;font-size:13px;line-height:1.5">${label}</div>
  </div>`;
}
// Auto-fill checklist from previously collected data
function autoFillChecklist(){
  const oh=getOnsetHours();
  const age=parseInt(D.age)||0;
  const tot=getNIHSS();

  // Inclusion
  if(D.ctResult==='ais'||D.ctResult==='neg') D.incl.ais=true;
  else if(D.ctResult==='ich') D.incl.ais=false;
  if(oh!==null) D.incl.onset45=(oh<=4.5);
  if(age>0) D.incl.age18=(age>=18);

  // Absolute exclusion from data
  if(tot>25) D.excl45.nihss25=true;
  // age >80 relative
  if(age>80) D.relExcl45.age80=true;
}

window.updateCKResult=function(){
  const el2=eligible(),ab=hasAbs(),inc=allIncl();
  const decBg=el2?'var(--sbg)':ab?'var(--dbg)':'var(--wbg)';
  const decCo=el2?'var(--stx)':ab?'var(--dtx)':'var(--wtx)';
  const decBd=el2?'var(--sbd)':ab?'var(--dbd)':'var(--wbd)';
  const decTx=el2?'เข้าเกณฑ์การให้ rt-PA':ab?'ห้ามให้ rt-PA — มีข้อห้ามเด็ดขาด':'ยังประเมินไม่ครบ';
  const absLabels=ABS.filter(i=>D.absExcl[i.id]).map(i=>i.th);
  const labKeyLabels={gl:'Blood sugar <50 mg/dL (จาก Lab)',plt:'Platelet <100,000 (จาก Lab)',ac:'Anticoagulant INR >1.7 หรือ PT >15 (จาก Lab)'};
  const otherAbs=Object.keys(D.absExcl||{}).filter(k=>D.absExcl[k]&&labKeyLabels[k]).map(k=>labKeyLabels[k]);
  const allAbsReasons=[...absLabels,...otherAbs];
  const decReason=el2?'Inclusion ครบ 3 ข้อ · ไม่มีข้อห้ามเด็ดขาด':ab?(allAbsReasons.length?'ข้อห้ามเด็ดขาดที่พบ: '+allAbsReasons.join('; '):'มีรายการข้อห้ามเด็ดขาดถูกเลือกอยู่ด้านบน'):(inc?'กรุณาตรวจ Absolute Exclusion ด้านบน — ทำเครื่องหมายเฉพาะรายการที่พบจริง': 'กรุณาตรวจ Inclusion 3 ข้อให้ครบ');
  const el3=document.getElementById('ckResult');
  const reasonEl=document.getElementById('ckReason');
  if(el3){el3.style.background=decBg;el3.style.borderColor=decBd;el3.style.color=decCo;el3.querySelector('div:first-child').textContent=decTx;}
  if(reasonEl){reasonEl.textContent=decReason;}
};

// AI removed — rule-based system only

function getRecommendedAction(){
  const tot=getNIHSS();const oh=getOnsetHours();const el=eligible();const ab=hasAbs();const lvo=suspectLVO();
  if(D.ctResult==='ich')return 'refer-ich';
  if(oh!==null&&oh<=4.5&&el&&tot>=4)return 'rtpa';
  if(oh!==null&&oh<=4.5&&tot<=3)return 'ward';
  if(oh!==null&&oh>4.5&&oh<=24&&tot>=6&&lvo)return 'refer-thr';
  if(oh!==null&&oh>4.5&&oh<=24&&tot<6)return 'ward';
  if(oh!==null&&oh>24)return 'ward';
  if(ab)return 'icu';
  return 'conservative';
}

  if(!D.age)out.push({step:0,label:'อายุ'});
  if(!D.weight)out.push({step:0,label:'น้ำหนัก'});
  if(!D.strokeOnset&&!D.lastSeen)out.push({step:1,label:'Stroke onset / Last seen normal'});
  if(!D.erArrival)out.push({step:1,label:'ER arrival'});
  if(!D.ctResult)out.push({step:3,label:'ผล CT Brain'});
  const rec=getRecommendedAction();
  if(rec==='rtpa'){
    if(D.rtpaGiven===null)out.push({step:7,label:'การตัดสินใจ: ให้ rt-PA หรือไม่ให้ (Refer)'});
    else if(D.rtpaGiven===true&&!D.ivRtPA)out.push({step:7,label:'เวลาเริ่มให้ IV rt-PA'});
    else if(D.rtpaGiven===false&&!D.referTime)out.push({step:7,label:'เวลา Refer / ตัดสินใจไม่ให้'});
  }
  if(rec==='refer-ich'||rec==='refer-thr'){ if(!D.referTime)out.push({step:7,label:'เวลา Refer'}); }
  return out;
}

async function generatePDF(){
  const missing=getMissingForPDF();
  if(missing.length>0){
    const msg='กรอกให้ครบก่อนพิมพ์ PDF:\n\n'+missing.map(m=>'• '+m.label).join('\n')+'\n\nกลับไปกรอกขั้นตอนที่เกี่ยวข้องแล้วกดพิมพ์อีกครั้ง';
    alert(msg);
    return;
  }
  const ol=document.getElementById('pdfProgress');ol.style.display='flex';
  const setP=(m,p)=>{document.getElementById('pdfMsg').textContent=m;document.getElementById('pdfBar').style.width=p+'%';};
  try{
    setP('สร้างเอกสาร...',10);
    const el=document.getElementById('pdfSummary');
    el.innerHTML=buildSummaryHTML();
    await new Promise(r=>setTimeout(r,300));
    setP('Render PDF...',20);
    const cv=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff',width:794});
    el.innerHTML='';
    const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    const imgD=cv.toDataURL('image/jpeg',0.92);const ih=(cv.height/cv.width)*pw;
    let y=0;while(y<ih-1){if(y>0)pdf.addPage();pdf.addImage(imgD,'JPEG',0,-y,pw,ih);y+=ph;}
    setP('เพิ่มรูปภาพ...',50);
    for(let i=0;i<D.attachImages.length;i++){
      pdf.addPage();const img=new Image();await new Promise(r=>{img.onload=r;img.src=D.attachImages[i].dataUrl;});
      const r=img.width/img.height;let iw=pw-20,ih2=iw/r;if(ih2>ph-30){ih2=ph-30;iw=ih2*r;}
      pdf.setFontSize(9);pdf.setTextColor(150);pdf.text(D.attachImages[i].name,10,10);
      pdf.addImage(D.attachImages[i].dataUrl,'JPEG',(pw-iw)/2,14,iw,ih2);
    }
    setP('รวม PDF...',70);
    const mb=pdf.output('arraybuffer');const{PDFDocument}=PDFLib;const merged=await PDFDocument.load(mb);
    for(const d of D.attachDocs){
      try{const at=await PDFDocument.load(d.arrayBuffer,{ignoreEncryption:true});const pgs=await merged.copyPages(at,at.getPageIndices());pgs.forEach(p=>merged.addPage(p));}catch(e){}
    }
    setP('บันทึกไฟล์...',90);
    const fb=await merged.save();const blob=new Blob([fb],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`stroke_refer_${D.hn||'case'}_${new Date().toISOString().slice(0,10)}.pdf`;a.click();URL.revokeObjectURL(url);

    // Log anonymized case to Turso (silent — ไม่แสดง error ถ้าไม่ได้ตั้งค่า)
    const recKey=(()=>{
      const oh=getOnsetHours();const tot=getNIHSS();const lvo=suspectLVO();const el=eligible();const ab=hasAbs();
      if(D.ctResult==='ich')return'refer-ich';
      if(oh!==null&&oh<=4.5&&el&&tot>=4)return'rtpa';
      if(oh!==null&&oh<=4.5&&tot<=3)return'ward';
      if(oh!==null&&oh>4.5&&oh<=24&&tot>=6&&lvo)return'refer-thr';
      if(oh!==null&&oh>4.5&&oh<=24&&tot<6)return'ward';
      if(oh!==null&&oh>24)return'ward';
      if(ab)return'icu';
      return'conservative';
    })();
    logCase(recKey).catch(()=>{});

    setP('เสร็จแล้ว 🎉',100);await new Promise(r=>setTimeout(r,1200));
  }catch(e){alert('Error: '+e.message);}finally{ol.style.display='none';}
}

// ==================== NAVIGATION ====================
function validate(){
  if(step===0)return D.name&&D.hn&&D.age&&D.weight;
  if(step===1)return D.strokeOnset||D.lastSeen;
  if(step===3)return !!D.ctResult;
  return true;
}

function goNext(){
  if(!validate()){
    alert('กรุณากรอกข้อมูลที่จำเป็น (★) ก่อนดำเนินการต่อ');return;
  }
  if(step===7){generatePDF();return;}
  // Auto-fill checklist before entering step 6
  if(step===5){
    const oh=getOnsetHours();
    if(D.ctResult==='ais'||D.ctResult==='neg')D.incl.ais=true;
    if(oh!==null)D.incl.onset45=(oh<=4.5);
    if(parseInt(D.age)>=18)D.incl.age18=true;
  }
  step=Math.min(step+1,7);renderStep();
}
function goBack(){step=Math.max(step-1,0);renderStep();}

window.sendLineAlert=async function(type){
  const st=document.getElementById('lineStatus');
  const btnId=type==='neuro_alert'?'btnLineNeuro':'btnLineRefer';
  const btn=document.getElementById(btnId);
  if(!btn||!st)return;

  const origText=btn.querySelector('span:last-child').textContent;
  btn.disabled=true;
  btn.querySelector('span:last-child').textContent='กำลังส่ง...';
  st.textContent='';

  const oh=getOnsetHours();
  const tot=getNIHSS();
  const sv=getSev(tot);
  const dn=diffMin(D.erArrival,D.ivRtPA);
  const ctMap={ich:'Hemorrhagic',ais:'Ischemic/No acute',neg:'Normal',pend:'Pending'};

  // Action label
  let actionLabel='';
  if(D.ctResult==='ich')actionLabel='REFER ทันที — Hemorrhagic';
  else if(oh!==null&&oh<=4.5&&eligible()&&tot>=4)actionLabel='ให้ rt-PA';
  else if(oh!==null&&oh>4.5&&oh<=24&&tot>=6&&suspectLVO())actionLabel='REFER Thrombectomy';
  else actionLabel='Admit / Conservative';

  const payload={
    type,
    data:{
      ward:D.ward||'ไม่ระบุ',
      onset:oh!==null?oh.toFixed(1):'ไม่ทราบ',
      nihss:tot,
      nihss_sev:sv.label,
      ct:ctMap[D.ctResult]||'ไม่ระบุ',
      action:actionLabel,
      dtn:dn&&dn>0?dn:null,
    }
  };

  try{
    const r=await fetch('/line',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const d=await r.json();
    if(d.ok){
      st.textContent='✓ ส่ง LINE สำเร็จ';
      st.style.color='var(--stx)';
    } else {
      const errMsg=d.results?.[0]?.data?.message||d.error||'ไม่ทราบ';
      // ถ้าไม่ได้ตั้ง LINE env → แสดง copy fallback
      if(errMsg.includes('LINE_CHANNEL_ACCESS_TOKEN')||r.status===503){
        showLineCopyFallback(type,payload.data,actionLabel);
        st.textContent='';
      } else {
        st.textContent='❌ ส่งไม่สำเร็จ: '+errMsg;
        st.style.color='var(--dtx)';
      }
    }
  }catch(e){
    showLineCopyFallback(type,payload.data,actionLabel);
    st.textContent='';
  }

  btn.disabled=false;
  btn.querySelector('span:last-child').textContent=origText;
};

// ==================== TURSO CASE LOG ====================
// เก็บเฉพาะ clinical metadata — ไม่มีชื่อ นามสกุล HN
// PDPA-safe: ข้อมูลที่เก็บเป็น aggregate/statistical data ไม่ใช่ข้อมูลส่วนบุคคล

// ── Turso via Cloudflare Pages Function (/turso) ──
async function tursoExec(sql,args=[]){
  try{
    const r=await fetch('/turso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql,args})});
    const d=await r.json();
    if(d.results?.[0]?.type==='error')return{error:d.results[0].error.message};
    const rows=d.results?.[0]?.response?.result?.rows||[];
    const cols=d.results?.[0]?.response?.result?.cols||[];
    return{rows:rows.map(row=>Object.fromEntries(cols.map((c,i)=>[c.name,row[i].value])))};
  }catch(e){return{error:e.message};}
}

async function ensureSettingsTable(){
  await tursoExec(`CREATE TABLE IF NOT EXISTS settings (
    key   TEXT PRIMARY KEY,
    value TEXT
  )`);
}

async function ensureCaseTable(){
  // ตาราง case_log — ไม่มี personal data เลย
  await tursoExec(`CREATE TABLE IF NOT EXISTS case_log (
    id          INTEGER PRIMARY KEY AUTOINCREMENT,
    logged_at   TEXT DEFAULT (datetime('now','localtime')),
    ward        TEXT,
    age_group   TEXT,
    ct_result   TEXT,
    onset_bucket TEXT,
    nihss_score INTEGER,
    nihss_sev   TEXT,
    lvo_suspect INTEGER,
    rtpa_elig   INTEGER,
    abs_excl_n  INTEGER,
    rel_excl_n  INTEGER,
    action      TEXT,
    rtpa_given  INTEGER,
    referred    INTEGER,
    dtn_min     INTEGER,
    note        TEXT
  )`);
}

function ageGroup(a){
  const n=parseInt(a)||0;
  if(n<40)return '<40';if(n<50)return '40-49';if(n<60)return '50-59';
  if(n<70)return '60-69';if(n<80)return '70-79';return '≥80';
}
function onsetBucket(h){
  if(h===null)return'unknown';
  if(h<=4.5)return'0-4.5h';if(h<=24)return'4.5-24h';return'>24h';
}

async function logCase(rec){
  // Turso configured via Cloudflare env
  const tot=getNIHSS();const sev=getSev(tot);
  const oh=getOnsetHours();const dn=diffMin(D.erArrival,D.ivRtPA);
  const absN=Object.values(D.absExcl).filter(Boolean).length;
  const relN=Object.values(D.relExcl).filter(Boolean).length;
  const isReferred=rec==='refer-ich'||rec==='refer-thr';
  const rtpaGiven=rec==='rtpa'?1:0;
  await ensureCaseTable();
  const r=await tursoExec(
    `INSERT INTO case_log(ward,age_group,ct_result,onset_bucket,nihss_score,nihss_sev,lvo_suspect,rtpa_elig,abs_excl_n,rel_excl_n,action,rtpa_given,referred,dtn_min,note) VALUES(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)`,
    [D.ward||'',ageGroup(D.age),D.ctResult||'',onsetBucket(oh),tot,sev.label,suspectLVO()?1:0,eligible()?1:0,absN,relN,rec,rtpaGiven,isReferred?1:0,dn??-1,'']
  );
  return r.error?'error':'ok';
}

window.saveAdminPin=async function(){
  const np=document.getElementById('ap_new')?.value;
  const cp=document.getElementById('ap_conf')?.value;
  const st=document.getElementById('ap_status');
  if(!np||np.length!==4||!/^\d+$/.test(np)){st.textContent='❌ PIN ต้องเป็นตัวเลข 4 หลัก';st.style.color='var(--dtx)';return;}
  if(np!==cp){st.textContent='❌ PIN ไม่ตรงกัน';st.style.color='var(--dtx)';return;}
  st.textContent='กำลังบันทึก...';st.style.color='var(--wtx)';
  savePinLocal(np);
  const ok=await savePinRemote(np);
  if(ok){
    st.textContent='✓ บันทึก PIN ใหม่ไปยัง Turso สำเร็จ — staff ทุก device จะได้ PIN ใหม่';
    st.style.color='var(--stx)';
    document.getElementById('ap_new').value='';
    document.getElementById('ap_conf').value='';
  } else {
    st.textContent='❌ บันทึก Turso ไม่สำเร็จ — ตรวจสอบ URL/Token';
    st.style.color='var(--dtx)';
  }
};
