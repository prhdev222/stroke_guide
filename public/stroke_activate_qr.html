<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Activate — QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=IBM+Plex+Mono:wght@600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: #0f1623;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    min-height: 100vh;
  }
  .toolbar {
    max-width: 680px;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .toolbar a, .toolbar button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.08);
    color: #e2e8f0;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar a:hover, .toolbar button:hover { background: rgba(255,255,255,.14); }
  .toolbar .primary {
    background: linear-gradient(135deg, #c41e3a, #ea580c);
    border-color: rgba(0,0,0,.15);
    color: #fff;
  }
  .header { text-align: center; margin-bottom: 28px; max-width: 680px; width: 100%; }
  .header .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #94a3b8;
    opacity: 0.6;
    margin-bottom: 10px;
  }
  .header h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 10px; letter-spacing: -0.01em; }
  .header h1 span { color: #e53935; }
  .header .desc { font-size: 13px; color: #64748b; line-height: 1.8; }
  .header .desc strong { color: #94a3b8; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 680px;
    width: 100%;
  }
  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: #1a2235;
    border-radius: 20px;
    padding: 26px 20px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(255,255,255,.06);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 20px 20px 0 0;
  }
  .card.er::before { background: linear-gradient(90deg, #ef4444, #f97316); }
  .card.ward::before { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
  .card.ct::before { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
  .card.lab::before { background: linear-gradient(90deg, #10b981, #84cc16); }
  .dept-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
  }
  .card.er .dept-badge { background: rgba(239,68,68,.15); color: #fca5a5; }
  .card.ward .dept-badge { background: rgba(59,130,246,.15); color: #93c5fd; }
  .card.ct .dept-badge { background: rgba(139,92,246,.15); color: #c4b5fd; }
  .card.lab .dept-badge { background: rgba(16,185,129,.15); color: #6ee7b7; }
  .dept-name { font-size: 24px; font-weight: 700; color: #f1f5f9; letter-spacing: 0.02em; line-height: 1; }
  .dept-name-th { font-size: 12px; color: #94a3b8; font-weight: 400; margin-top: -6px; }
  .qr-wrap {
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    width: 152px;
    height: 152px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .qr-wrap canvas, .qr-wrap img { width: 128px !important; height: 128px !important; }
  .scan-hint { font-size: 11px; color: #475569; letter-spacing: 0.04em; text-align: center; line-height: 1.5; }
  .row-btns { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
  .row-btns button {
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: #cbd5e1;
    cursor: pointer;
    font-family: inherit;
  }
  .row-btns a {
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(112,144,255,.35);
    color: #93c5fd;
    text-decoration: none;
  }

  @media print {
    @page { size: A4; margin: 10mm; }
    body { background: #fff !important; padding: 0 !important; }
    .toolbar { display: none !important; }
    .header { margin: 0 0 10mm !important; }
    .header .eyebrow { color: #64748b !important; opacity: 1 !important; }
    .header h1 { color: #0f172a !important; }
    .header h1 span { color: #dc2626 !important; }
    .header .desc { color: #475569 !important; }
    .header .desc strong { color: #1e293b !important; }
    .grid { max-width: 100% !important; gap: 10mm !important; }
    .card { background: #fff !important; border: 1.5px solid #e2e8f0 !important; box-shadow: none !important; break-inside: avoid; }
    .dept-name { color: #0f172a !important; }
    .dept-name-th { color: #64748b !important; }
    .scan-hint { color: #94a3b8 !important; }
    .row-btns { display: none !important; }
    .qr-wrap { border: 1px solid #e5e7eb; box-shadow: none !important; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a class="primary" href="/">← กลับเมนูหลัก</a>
  <a href="/quick_menu.html">🚨 Quick</a>
  <a href="/stroke_guest.html?activate=1&unit=ER">เปิด Guest</a>
  <button type="button" onclick="window.print()">🖨 พิมพ์ QR</button>
</div>

<div class="header">
  <div class="eyebrow">🏥 โรงพยาบาลสงฆ์ · Priest Hospital · 2026</div>
  <h1>Stroke <span>Activate</span></h1>
  <p class="desc">
    สแกน QR จากมือถือแต่ละจุด (ER / Ward / CT / Lab) → เข้า <strong>Guest Mode</strong> พร้อมแถบแจ้งหน่วยงานที่เปิดใช้งาน
  </p>
</div>

<div class="grid" id="grid"></div>

<script>
(function(){
  // ปัก BASE ให้ชี้ไปปลายทางจริงของ Stroke Activate
  const BASE = 'https://stroke-activate.pages.dev';

  const UNITS = [
    { key: 'ER',   cls: 'er',   badge: 'ER Access',   th: 'ห้องฉุกเฉิน',  token: 'PRH_ER_2026' },
    { key: 'WARD', cls: 'ward', badge: 'Ward Access', th: 'หอผู้ป่วย',    token: 'PRH_WD_2026' },
    { key: 'CT',   cls: 'ct',   badge: 'CT Access',   th: 'ห้อง CT Scan', token: 'PRH_CT_2026' },
    { key: 'LAB',  cls: 'lab',  badge: 'Lab Access',  th: 'ห้อง Lab',     token: 'PRH_LB_2026' },
  ];

  function tokenUrl(token) {
    return BASE + '/?token=' + encodeURIComponent(token);
  }

  const grid = document.getElementById('grid');
  const hostLbl = (function(){
    try { return new URL(BASE).host; } catch (e) { return ''; }
  })();
  UNITS.forEach(function (u) {
    const wrapId = 'qr-' + u.key.toLowerCase();
    const card = document.createElement('div');
    card.className = 'card ' + u.cls;
    card.innerHTML =
      '<span class="dept-badge">' + u.badge + '</span>' +
      '<div class="dept-name">' + u.key + '</div>' +
      '<div class="dept-name-th">' + u.th + '</div>' +
      '<div class="qr-wrap" id="' + wrapId + '"></div>' +
      '<span class="scan-hint">สแกนเพื่อเข้าระบบทันที' + (hostLbl ? '<br/>' + hostLbl : '') + '</span>' +
      '<div class="row-btns">' +
      '<a href="' + tokenUrl(u.token) + '">เปิดลิงก์</a>' +
      '</div>';
    grid.appendChild(card);
    new QRCode(document.getElementById(wrapId), {
      text: tokenUrl(u.token),
      width: 128,
      height: 128,
      colorDark: '#0f172a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  });
})();
</script>
</body>
</html>
