# ต้องตรงชื่อโปรเจกต์ Pages ใน Dashboard (Workers & Pages)
# มี pages_build_output_dir แล้ว = Cloudflare ใช้ไฟล์นี้เป็น source of truth
# → แก้ KV/R2 ที่นี่ แล้ว push — หน้า Dashboard มัก "กด Add binding" ไม่ได้ (เป็นเรื่องปกติ)
name = "stroke-prh"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# ============================================================
# Environment Variables — ตั้งใน Cloudflare Pages Dashboard
# Settings → Environment Variables → Add variable
# ============================================================
#
# [Turso Database — จำเป็น]
#   TURSO_URL     = https://stroke-db-xxxxxx.turso.io
#   TURSO_TOKEN   = eyJhbGci...
#
# ── AI: Fallback Chain (ใส่ key ที่มี ลองตามลำดับ) ──────
#   GROQ_API_KEY       = gsk_...     (console.groq.com — ฟรี)
#   SAMBANOVA_API_KEY  = sn-...      (cloud.sambanova.ai — ฟรี)
#   OPENAI_API_KEY     = sk-...      (มีค่าใช้จ่าย)
#   ANTHROPIC_API_KEY  = sk-ant-...  (มีค่าใช้จ่าย)
#
# [optional: เปลี่ยน model แต่ละ provider]
#   GROQ_MODEL         = llama-3.3-70b-versatile
#   SAMBANOVA_MODEL    = Meta-Llama-3.1-70B-Instruct
#   OPENAI_MODEL       = gpt-4o-mini
#   CLAUDE_MODEL       = claude-haiku-4-5-20251001
#
# ── AI: Single Provider ───────────────────────────────────
#   AI_PROVIDER   = groq | sambanova | claude | openai | openai_compat
#   AI_MODEL      = llama-3.3-70b-versatile
#   AI_API_KEY    = your-api-key
#   AI_BASE_URL   = (เฉพาะ openai_compat)
#
# ── Resend Email (optional — ปุ่มส่ง PDF ให้ Admin ใน Staff wizard) ──
#   RESEND_API_KEY  = re_... จาก resend.com (บัญชีที่สมัครด้วยเมลทีม stroke)
#   ADMIN_EMAIL     = stroketeamprh@gmail.com  (ให้ตรงอีเมลที่ verify ใน Resend — Free tier)
#
# ── LINE Messaging API (optional) ────────────────────────
# สมัคร LINE OA → business.line.me → Messaging API
# รพ.อื่นใช้ → ตั้ง ENV ชุดนี้ใหม่ ไม่ต้องแก้โค้ด
#
#   LINE_CHANNEL_ACCESS_TOKEN = xxxxxxxxxxxxxxxx
#   WEBAPP_URL                = https://stroke-prh.pages.dev
#
# [optional — ถ้าไม่ใส่ = Broadcast หาทุกคนที่ Add OA]
#   LINE_NEURO_USER_ID  = Uxxxxxxxxxx  (User ID แพทย์ระบบประสาท)
#   LINE_REFER_USER_ID  = Cxxxxxxxxxx  (Group ID ทีม refer)
#
# ── รหัสหน่วย Staff (Admin ตั้งรหัสประจำหน่วย เช่น ER 1234, MED1 2417) ──
#   ADMIN_SECRET  = รหัสลับสำหรับเข้าเมนู "ตั้งรหัสหน่วย" ใน 📦 → ตั้งรหัสหน่วย (Admin)
#
# ── CT ชั่วคราว (แชร์ภาพ CT ให้ Neuro — R2 + KV) ────────
#   คู่มือละเอียด: docs/CT_NEURO_SHARE_SETUP.md
#   1) wrangler r2 bucket create stroke-ct-temp
#   2) wrangler kv namespace create CT_SESSIONS
#   3) wrangler kv namespace create CT_SESSIONS --preview   (สำหรับ local)
#   4) ใส่ id / preview_id / bucket_name ใน [[kv_namespaces]] และ [[r2_buckets]] ด้านล่าง แล้ว push
#      (โปรเจกต์นี้ใช้ wrangler เป็น source of truth — ไม่ต้อง Add binding ใน Dashboard)
#   5) (ทางเลือก) CT_TEMP_SECRET — ไม่ตั้งได้; ถ้าตั้งแล้วต้องใส่ในช่อง wizard ตอนสร้างลิงก์
#   6) R2 Lifecycle (แดชบอร์ด): ลบ prefix ct/ หลัง 1 วัน — เก็บซากไฟล์หลัง KV หมดอายุ
# ============================================================

[vars]
ENVIRONMENT = "production"

# KV / R2 — ตรงกับ Workers KV + R2 ใน Dashboard (stroke-prh)
[[kv_namespaces]]
binding = "CT_SESSIONS"
id = "eb070dd86a344a9a9b19eefaf5f0f811"
preview_id = "bfe2fb9bb0a7403da2fcae214ff0ef63"

[[r2_buckets]]
binding = "CT_IMAGES"
bucket_name = "stroke-ct-temp"
