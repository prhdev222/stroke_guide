name = "stroke-fast-tract"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# ============================================================
# Environment Variables — ตั้งใน Cloudflare Pages Dashboard
# Settings → Environment Variables → Add variable
# ============================================================
#
# [Turso Database — จำเป็น]
#   TURSO_URL     = https://stroke-db-xxxxxx.turso.io
#   TURSO_TOKEN   = eyJhbGci...
#
# ── AI: Fallback Chain (ใส่ key ที่มี ลองตามลำดับ) ──────
#   GROQ_API_KEY       = gsk_...     (console.groq.com — ฟรี)
#   SAMBANOVA_API_KEY  = sn-...      (cloud.sambanova.ai — ฟรี)
#   OPENAI_API_KEY     = sk-...      (มีค่าใช้จ่าย)
#   ANTHROPIC_API_KEY  = sk-ant-...  (มีค่าใช้จ่าย)
#
# [optional: เปลี่ยน model แต่ละ provider]
#   GROQ_MODEL         = llama-3.3-70b-versatile
#   SAMBANOVA_MODEL    = Meta-Llama-3.1-70B-Instruct
#   OPENAI_MODEL       = gpt-4o-mini
#   CLAUDE_MODEL       = claude-haiku-4-5-20251001
#
# ── AI: Single Provider ───────────────────────────────────
#   AI_PROVIDER   = groq | sambanova | claude | openai | openai_compat
#   AI_MODEL      = llama-3.3-70b-versatile
#   AI_API_KEY    = your-api-key
#   AI_BASE_URL   = (เฉพาะ openai_compat)
#
# ── LINE Messaging API (optional) ────────────────────────
# สมัคร LINE OA → business.line.me → Messaging API
# รพ.อื่นใช้ → ตั้ง ENV ชุดนี้ใหม่ ไม่ต้องแก้โค้ด
#
#   LINE_CHANNEL_ACCESS_TOKEN = xxxxxxxxxxxxxxxx
#   WEBAPP_URL                = https://stroke-prh.pages.dev
#
# [optional — ถ้าไม่ใส่ = Broadcast หาทุกคนที่ Add OA]
#   LINE_NEURO_USER_ID  = Uxxxxxxxxxx  (User ID แพทย์ระบบประสาท)
#   LINE_REFER_USER_ID  = Cxxxxxxxxxx  (Group ID ทีม refer)
#
# ── รหัสหน่วย Staff (Admin ตั้งรหัสประจำหน่วย เช่น ER 1234, MED1 2417) ──
#   ADMIN_SECRET  = รหัสลับสำหรับเข้าเมนู "ตั้งรหัสหน่วย" ใน 📦 → ตั้งรหัสหน่วย (Admin)
# ============================================================

[vars]
ENVIRONMENT = "production"
